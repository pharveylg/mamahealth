// ---------------------------------------------------------------------------
// Session wrapper — decides whether to show the login screen or the app.
// The signed-in email is just stored locally (no password, no OAuth); it's
// only used to identify the caregiver on the patient profile screen and to
// register a row in the Users sheet.
// ---------------------------------------------------------------------------
// Multi-user note: whether to land a fresh sign-in on Patient Profile is now
// decided per EMAIL, not per device — a device that's hosted other users
// before shouldn't skip profile setup for someone signing in for the first
// time. loadLocal("profile", ...) is already scoped to whichever email is
// currentUserEmail at call time (see storageKeyFor above).
// ---------------------------------------------------------------------------
function AppRoot() {
  const [userEmail, setUserEmail] = useState(() => {
    const stored = loadLocal("session", null);
    setCurrentUserEmail(stored); // must happen before any child reads user-scoped cache
    return stored;
  });
  const [landOnProfile, setLandOnProfile] = useState(false);

  useEffect(() => {
    saveLocal("hasLaunched", true);
  }, []);

  const handleSignIn = (email) => {
    setCurrentUserEmail(email); // set before reading cache or mounting MamasHealthApp
    saveLocal("session", email);
    setUserEmail(email);
    const cachedProfile = loadLocal("profile", null);
    const hasProfile = !!(cachedProfile && cachedProfile.name && cachedProfile.name.trim());
    setLandOnProfile(!hasProfile);
  };

  const handleSignOut = () => {
    saveLocal("session", null);
    setCurrentUserEmail(null);
    setUserEmail(null);
    setLandOnProfile(false);
  };

  if (!userEmail) {
    return <LoginScreen onSignIn={handleSignIn} />;
  }

  return (
    <MamasHealthApp
      userEmail={userEmail}
      initialTab={landOnProfile ? "settings" : "home"}
      onSignOut={handleSignOut}
    />
  );
}

// ---------------------------------------------------------------------------
// Error boundary — without this, ANY render crash anywhere in the app
// (a bad prop, unexpected data shape, etc.) unmounts the whole tree and
// leaves a silent blank white screen with no clue why. This catches it and
// shows the actual error instead, plus a way back to Home without losing
// the session.
// ---------------------------------------------------------------------------
class AppErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) {
    return { error };
  }
  componentDidCatch(error, info) {
    console.error("App crashed:", error, info);
  }
  render() {
    if (this.state.error) {
      return (
        <div className="min-h-screen w-full flex justify-center items-center bg-gray-100 app-font px-6">
          <div className="w-full max-w-md bg-white rounded-3xl shadow-xl p-6 text-center">
            <p className="app-font-display text-2xl font-bold text-gray-900 mb-2">
              Something went wrong
            </p>
            <p className="text-lg text-gray-500 mb-5">
              {this.state.error.message || "An unexpected error occurred."}
            </p>
            <button
              onClick={() => window.location.reload()}
              className="w-full h-14 rounded-2xl bg-blue-600 text-white text-lg font-bold"
            >
              Reload
            </button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <AppErrorBoundary>
    <AppRoot />
  </AppErrorBoundary>
);
</script>

  (function () {
    var source = document.getElementById("app-source").textContent;
    var compiled = Babel.transform(source, {
      presets: [["react", { runtime: "classic" }]],
      filename: "mamas-health-app.jsx",
    }).code;
    var script = document.createElement("script");
    script.text = compiled;
    document.body.appendChild(script);
  })();
</script>
