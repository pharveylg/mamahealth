// ---------------------------------------------------------------------------
// Data helpers — fall back to mock data if the backend isn't configured yet
// ---------------------------------------------------------------------------
const MOCK_VITALS = [
  { id: "bp", label: "Blood Pressure", value: "120/80", unit: "mmHg", status: "Normal", time: "Today, 8:02 AM", icon: HeartIcon, accent: "text-blue-600", chip: "bg-green-100 text-green-800", ring: "ring-blue-100" },
  { id: "hr", label: "Heart Rate", value: "72", unit: "BPM", status: "Normal", time: "Today, 8:02 AM", icon: ActivityIcon, accent: "text-rose-600", chip: "bg-green-100 text-green-800", ring: "ring-rose-100" },
  { id: "sugar", label: "Blood Sugar", value: "95", unit: "mg/dL", status: "Normal", time: "Today, 7:45 AM", icon: DropletIcon, accent: "text-amber-600", chip: "bg-green-100 text-green-800", ring: "ring-amber-100" },
];

const MOCK_MEDS = {
  Morning: [
    { id: "m1", name: "Lisinopril", dose: "10 mg", note: "Take with food", taken: false },
    { id: "m2", name: "Metformin", dose: "500 mg", note: "Take after breakfast", taken: true },
  ],
  Afternoon: [
    { id: "a1", name: "Vitamin D3", dose: "1000 IU", note: "Take with lunch", taken: false },
  ],
  Evening: [
    { id: "e1", name: "Atorvastatin", dose: "20 mg", note: "Take before bed", taken: false },
    { id: "e2", name: "Aspirin", dose: "81 mg", note: "Take with dinner", taken: false },
  ],
};

const VITAL_ICONS = { bp: HeartIcon, hr: ActivityIcon, sugar: DropletIcon };
const VITAL_STYLE = {
  bp: { accent: "text-blue-600", ring: "ring-blue-100" },
  hr: { accent: "text-rose-600", ring: "ring-rose-100" },
  sugar: { accent: "text-amber-600", ring: "ring-amber-100" },
};
const TIME_ICON_BG = {
  Morning: "bg-amber-50 text-amber-600",
  Afternoon: "bg-sky-50 text-sky-600",
  Evening: "bg-indigo-50 text-indigo-600",
};
const PERIOD_ICON = { Morning: SunIcon, Afternoon: CloudIcon, Evening: MoonIcon };

const isBackendConfigured = () =>
  API_URL && API_URL.indexOf("PASTE_YOUR_APPS_SCRIPT") === -1;

// Apps Script POST helper. We deliberately send text/plain to avoid a CORS
// preflight request, then JSON.parse(e.postData.contents) on the server.
async function callApi(action, payload) {
  if (!isBackendConfigured()) return null;
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action, ...payload }),
  });
  return res.json();
}

async function fetchApi(action) {
  if (!isBackendConfigured()) return null;
  const res = await fetch(`${API_URL}?action=${action}`);
  return res.json();
}

// ---------------------------------------------------------------------------
// Quick-log bottom sheet for recording a new vital reading
// ---------------------------------------------------------------------------
function LogVitalSheet({ vital, onClose, onSave }) {
  const [systolic, setSystolic] = useState("");
  const [diastolic, setDiastolic] = useState("");
  const [single, setSingle] = useState("");

  const canSave =
    vital.id === "bp" ? systolic && diastolic : single;

  const handleSave = () => {
    if (!canSave) return;
    const value = vital.id === "bp" ? `${systolic}/${diastolic}` : single;
    onSave(vital.id, value);
  };

  return (
    <div className="fixed inset-0 z-40 flex items-end justify-center max-w-md mx-auto left-0 right-0">
      <div
        className="absolute inset-0 bg-black/40"
        onClick={onClose}
      />
      <div className="relative w-full bg-white rounded-t-[28px] p-6 pb-8 shadow-2xl animate-[slideUp_.2s_ease-out]">
        <div className="flex items-center justify-between mb-5">
          <h3 className="app-font-display text-2xl font-bold text-gray-900">
            Log {vital.label}
          </h3>
          <button
            onClick={onClose}
            aria-label="Close"
            className="h-11 w-11 rounded-full bg-gray-100 flex items-center justify-center"
          >
            <XIcon className="h-5 w-5 text-gray-500" />
          </button>
        </div>

        {vital.id === "bp" ? (
          <div className="flex items-center gap-3">
            <div className="flex-1">
              <label className="text-lg font-medium text-gray-600">Systolic</label>
              <input
                type="number"
                inputMode="numeric"
                value={systolic}
                onChange={(e) => setSystolic(e.target.value)}
                placeholder="120"
                className="mt-2 w-full h-16 text-2xl font-bold text-center rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
              />
            </div>
            <span className="text-3xl font-bold text-gray-300 mt-7">/</span>
            <div className="flex-1">
              <label className="text-lg font-medium text-gray-600">Diastolic</label>
              <input
                type="number"
                inputMode="numeric"
                value={diastolic}
                onChange={(e) => setDiastolic(e.target.value)}
                placeholder="80"
                className="mt-2 w-full h-16 text-2xl font-bold text-center rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
              />
            </div>
          </div>
        ) : (
          <div>
            <label className="text-lg font-medium text-gray-600">
              {vital.label} ({vital.unit})
            </label>
            <input
              type="number"
              inputMode="numeric"
              value={single}
              onChange={(e) => setSingle(e.target.value)}
              placeholder={vital.value}
              className="mt-2 w-full h-16 text-2xl font-bold text-center rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
            />
          </div>
        )}

        <button
          disabled={!canSave}
          onClick={handleSave}
          className={`mt-6 w-full h-16 rounded-2xl text-xl font-bold text-white shadow-md transition-transform active:scale-[0.98] ${
            canSave ? "bg-blue-600" : "bg-gray-300"
          }`}
        >
          Save Reading
        </button>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Main App
// ---------------------------------------------------------------------------
function MamasHealthApp() {
  const [vitals, setVitals] = useState(MOCK_VITALS);
  const [meds, setMeds] = useState(MOCK_MEDS);
  const [activeTab, setActiveTab] = useState("home");
  const [toast, setToast] = useState(null);
  const [loggingVital, setLoggingVital] = useState(null);
  const [loading, setLoading] = useState(isBackendConfigured());

  const showToast = useCallback((message) => {
    setToast(message);
    window.setTimeout(() => setToast(null), 2200);
  }, []);

  useEffect(() => {
    if (!isBackendConfigured()) return;
    (async () => {
      try {
        const data = await fetchApi("getData");
        if (data && data.vitals) {
          setVitals(
            data.vitals.map((v) => ({
              ...v,
              icon: VITAL_ICONS[v.id],
              accent: VITAL_STYLE[v.id]?.accent,
              ring: VITAL_STYLE[v.id]?.ring,
              chip:
                v.status === "Normal"
                  ? "bg-green-100 text-green-800"
                  : "bg-amber-100 text-amber-800",
            }))
          );
        }
        if (data && data.medications) setMeds(data.medications);
      } catch (err) {
        showToast("Could not reach the server — showing saved data");
      } finally {
        setLoading(false);
      }
    })();
  }, [showToast]);

  const toggleMed = async (period, id) => {
    let nextTaken = null;
    setMeds((prev) => ({
      ...prev,
      [period]: prev[period].map((m) => {
        if (m.id === id) nextTaken = !m.taken;
        return m.id === id ? { ...m, taken: !m.taken } : m;
      }),
    }));
    try {
      await callApi("toggleMedication", { id, taken: nextTaken });
    } catch (err) {
      showToast("Saved locally — sync failed");
    }
  };

  const saveVital = async (vitalId, value) => {
    setLoggingVital(null);
    const now = new Date();
    const timeLabel = `Today, ${now.toLocaleTimeString([], {
      hour: "numeric",
      minute: "2-digit",
    })}`;
    setVitals((prev) =>
      prev.map((v) => (v.id === vitalId ? { ...v, value, time: timeLabel } : v))
    );
    showToast("Reading saved");
    try {
      await callApi("logVital", { id: vitalId, value, timestamp: now.toISOString() });
    } catch (err) {
      showToast("Saved locally — sync failed");
    }
  };

  const totalMeds = Object.values(meds).flat().length;
  const takenMeds = Object.values(meds).flat().filter((m) => m.taken).length;

  return (
    <div className="min-h-screen w-full flex justify-center bg-gray-100 app-font">
      <div className="w-full max-w-md min-h-screen bg-[#F8F9FC] relative shadow-2xl overflow-hidden">
        {/* ---------------- Top App Bar ---------------- */}
        <header className="px-5 pt-6 pb-5 bg-white rounded-b-[28px] shadow-sm sticky top-0 z-20">
          <div className="flex items-center gap-2 mb-3">
            <span className="h-8 w-8 rounded-full bg-blue-600 flex items-center justify-center shadow">
              <HeartIcon className="h-4 w-4 text-white" strokeWidth={0} style={{ fill: "white" }} />
            </span>
            <p className="text-sm font-bold tracking-wide text-blue-600 uppercase">
              Mama's Health App
            </p>
          </div>
          <div className="flex items-start justify-between">
            <div>
              <p className="app-font-display text-2xl font-bold text-gray-900 leading-tight">
                Good morning,
              </p>
              <p className="app-font-display text-2xl font-bold text-blue-600 leading-tight">
                Eleanor
              </p>
              <p className="text-lg text-gray-500 mt-1">
                {new Date().toLocaleDateString(undefined, {
                  weekday: "long",
                  month: "long",
                  day: "numeric",
                })}
              </p>
            </div>
            <button
              aria-label="Your profile"
              className="h-12 w-12 rounded-full bg-blue-600 ring-4 ring-blue-50 flex items-center justify-center shadow-md"
            >
              <span className="text-white text-lg font-bold">E</span>
            </button>
          </div>

          <button
            onClick={() => showToast("Listening for your command…")}
            className="mt-5 w-full h-16 rounded-3xl bg-blue-50 border-2 border-blue-100 flex items-center gap-4 px-5 active:scale-[0.98] transition-transform"
          >
            <span className="h-11 w-11 rounded-full bg-blue-600 flex items-center justify-center shrink-0 shadow">
              <MicIcon className="h-6 w-6 text-white" />
            </span>
            <span className="text-lg font-medium text-blue-900">
              Tap to speak to your app
            </span>
          </button>
        </header>

        {/* ---------------- Content ---------------- */}
        <main className="px-5 pb-32 pt-6 space-y-8">
          {loading && (
            <p className="text-center text-lg text-gray-400">Loading today's data…</p>
          )}

          {/* Vitals */}
          <section>
            <h2 className="app-font-display text-2xl font-bold text-gray-900 mb-4">
              Today's Vitals
            </h2>
            <div className="space-y-4">
              {vitals.map((v) => {
                const IconComp = v.icon || VITAL_ICONS[v.id];
                return (
                  <div key={v.id} className={`bg-white rounded-3xl shadow-md p-5 ring-1 ${v.ring}`}>
                    <div className="flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <span className="h-12 w-12 rounded-2xl bg-gray-50 flex items-center justify-center">
                          <IconComp className={`h-7 w-7 ${v.accent}`} />
                        </span>
                        <div>
                          <p className="text-lg font-semibold text-gray-700">{v.label}</p>
                          <p className="text-sm text-gray-400">{v.time}</p>
                        </div>
                      </div>
                      <span className={`px-3 py-1 rounded-full text-sm font-bold ${v.chip}`}>
                        {v.status}
                      </span>
                    </div>

                    <div className="mt-4 flex items-end justify-between">
                      <p className="app-font-display text-4xl font-black text-gray-900">
                        {v.value}
                        <span className="text-lg font-medium text-gray-400 ml-2">{v.unit}</span>
                      </p>
                      <button
                        onClick={() => setLoggingVital(v)}
                        className="h-14 px-5 rounded-2xl bg-blue-600 active:bg-blue-700 text-white text-lg font-semibold flex items-center gap-2 shadow-md active:scale-[0.97] transition-transform"
                      >
                        <PlusIcon className="h-5 w-5" />
                        Log New
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          </section>

          {/* Medications */}
          <section>
            <div className="flex items-center justify-between mb-4">
              <h2 className="app-font-display text-2xl font-bold text-gray-900">
                My Medications
              </h2>
              <span className="text-lg font-semibold text-gray-500">
                {takenMeds}/{totalMeds} taken
              </span>
            </div>

            <div className="space-y-6">
              {Object.entries(meds).map(([period, list]) => {
                const PeriodIcon = PERIOD_ICON[period];
                return (
                  <div key={period}>
                    <div className="flex items-center gap-2 mb-3">
                      <span className={`h-9 w-9 rounded-full flex items-center justify-center ${TIME_ICON_BG[period]}`}>
                        <PeriodIcon className="h-5 w-5" />
                      </span>
                      <h3 className="text-xl font-bold text-gray-800">{period}</h3>
                    </div>

                    <div className="space-y-3">
                      {list.map((m) => (
                        <div
                          key={m.id}
                          className={`bg-white rounded-3xl shadow-md p-4 flex items-center justify-between gap-3 transition-colors ${
                            m.taken ? "bg-green-50/60" : ""
                          }`}
                        >
                          <div className="min-w-0">
                            <p
                              className={`text-xl font-bold text-gray-900 truncate ${
                                m.taken ? "line-through decoration-2 text-gray-400" : ""
                              }`}
                            >
                              {m.name}
                            </p>
                            <p
                              className={`text-lg text-gray-500 truncate ${
                                m.taken ? "line-through decoration-2 text-gray-300" : ""
                              }`}
                            >
                              {m.dose} · {m.note}
                            </p>
                          </div>

                          <button
                            onClick={() => toggleMed(period, m.id)}
                            aria-pressed={m.taken}
                            aria-label={m.taken ? `Mark ${m.name} as not taken` : `Mark ${m.name} as taken`}
                            className={`h-14 w-14 shrink-0 rounded-2xl flex items-center justify-center border-2 transition-all active:scale-90 ${
                              m.taken ? "bg-green-600 border-green-600 shadow-md" : "bg-white border-gray-300"
                            }`}
                          >
                            <CheckIcon
                              className={`h-7 w-7 ${m.taken ? "text-white" : "text-gray-300"}`}
                              strokeWidth={3}
                            />
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </section>
        </main>

        {/* Toast */}
        {toast && (
          <div className="fixed max-w-md mx-auto left-0 right-0 bottom-24 flex justify-center px-6 z-30">
            <div className="bg-gray-900 text-white text-lg font-medium px-5 py-3 rounded-2xl shadow-xl">
              {toast}
            </div>
          </div>
        )}

        {/* Log vital sheet */}
        {loggingVital && (
          <LogVitalSheet
            vital={loggingVital}
            onClose={() => setLoggingVital(null)}
            onSave={saveVital}
          />
        )}

        {/* ---------------- Bottom Navigation ---------------- */}
        <nav className="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-100 rounded-t-[28px] shadow-[0_-4px_16px_rgba(0,0,0,0.06)] px-4 pt-2 pb-4">
          <div className="flex items-center justify-around">
            {[
              { key: "home", label: "Home", icon: HomeIcon },
              { key: "meds", label: "Medications", icon: PillIcon },
              { key: "settings", label: "Settings", icon: SettingsIcon },
            ].map((tab) => {
              const TabIcon = tab.icon;
              const active = activeTab === tab.key;
              return (
                <button
                  key={tab.key}
                  onClick={() => setActiveTab(tab.key)}
                  className="flex flex-col items-center gap-1 flex-1 py-1"
                >
                  <span className={`h-10 w-16 rounded-full flex items-center justify-center transition-colors ${active ? "bg-blue-100" : ""}`}>
                    <TabIcon
                      className={`h-6 w-6 ${active ? "text-blue-700" : "text-gray-400"}`}
                      strokeWidth={active ? 2.5 : 2}
                    />
                  </span>
                  <span className={`text-sm font-semibold ${active ? "text-blue-700" : "text-gray-400"}`}>
                    {tab.label}
                  </span>
                </button>
              );
            })}
          </div>
        </nav>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<MamasHealthApp />);
</script>
</body>
</html>
