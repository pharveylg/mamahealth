function formatTime12h(timeStr) {
  const [hStr, mStr] = String(timeStr).split(":");
  let h = parseInt(hStr, 10);
  const m = mStr || "00";
  if (isNaN(h)) return timeStr;
  const suffix = h >= 12 ? "PM" : "AM";
  h = h % 12;
  if (h === 0) h = 12;
  return `${h}:${m} ${suffix}`;
}

const isBackendConfigured = () =>
  API_URL && API_URL.indexOf("PASTE_YOUR_APPS_SCRIPT") === -1;

// Apps Script POST helper. We deliberately send text/plain to avoid a CORS
// preflight request, then JSON.parse(e.postData.contents) on the server.
async function callApi(action, payload) {
  if (!isBackendConfigured()) return null;
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ action, ...payload }),
  });
  return res.json();
}

async function fetchApi(action) {
  if (!isBackendConfigured()) return null;
  const res = await fetch(`${API_URL}?action=${action}`);
  return res.json();
}

// ---------------------------------------------------------------------------
// Offline support: local cache of the last-known data, plus a queue of
// writes made while offline (or while a request fails), replayed once the
// connection comes back.
// ---------------------------------------------------------------------------
const STORAGE_PREFIX = "mamahq:";

function loadLocal(key, fallback) {
  try {
    const raw = window.localStorage.getItem(STORAGE_PREFIX + key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (err) {
    // Storage may be unavailable (private browsing, restricted preview, etc).
    return fallback;
  }
}

function saveLocal(key, value) {
  try {
    window.localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value));
  } catch (err) {
    // Ignore — the app still works in-memory for this session.
  }
}

function getQueue() {
  return loadLocal("pendingSync", []);
}

function queueAction(action, payload) {
  const queue = getQueue();
  queue.push({
    id: "q_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8),
    action,
    payload,
    queuedAt: new Date().toISOString(),
  });
  saveLocal("pendingSync", queue);
  return queue.length;
}

// Replays queued writes in the order they were made. Stops at the first
// failure so a later change can't overwrite an earlier one out of order —
// it will simply retry from there next time we're back online.
async function flushQueue() {
  let queue = getQueue();
  while (queue.length > 0 && typeof navigator !== "undefined" && navigator.onLine) {
    const item = queue[0];
    try {
      await callApi(item.action, item.payload);
      queue = queue.slice(1);
      saveLocal("pendingSync", queue);
    } catch (err) {
      break;
    }
  }
  return queue.length;
}

// Every write in this app goes through here instead of calling callApi
// directly: if we're offline, or the request fails, the change is queued
// locally and retried automatically once the connection returns.
async function performApiAction(action, payload, onQueued) {
  if (!isBackendConfigured()) return null;
  if (typeof navigator !== "undefined" && !navigator.onLine) {
    const n = queueAction(action, payload);
    if (onQueued) onQueued(n);
    return null;
  }
  try {
    return await callApi(action, payload);
  } catch (err) {
    const n = queueAction(action, payload);
    if (onQueued) onQueued(n);
    return null;
  }
}

// ---------------------------------------------------------------------------
// File uploads (medical documents, profile photo) use a SEPARATE offline
// queue backed by IndexedDB, not the localStorage queue above. Browsers cap
// localStorage around 5-10MB total for the whole origin — a single 20MB
// document would blow that instantly. IndexedDB has a much larger practical
// quota and can store binary data directly, so it's the right tool for
// "let me upload this later when I'm back online."
// ---------------------------------------------------------------------------
const FILE_DB_NAME = "mamahq-files";
const FILE_STORE = "pendingFiles";

function openFileDB() {
  return new Promise((resolve, reject) => {
    if (!("indexedDB" in window)) return reject(new Error("IndexedDB unavailable"));
    const req = indexedDB.open(FILE_DB_NAME, 1);
    req.onupgradeneeded = () => {
      req.result.createObjectStore(FILE_STORE, { keyPath: "id" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function queueFileUpload(record) {
  // record: { id, kind: "document"|"profilePhoto", meta, base64Data, mimeType, fileName }
  try {
    const db = await openFileDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(FILE_STORE, "readwrite");
      tx.objectStore(FILE_STORE).put(record);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  } catch (err) {
    // IndexedDB unavailable — the upload simply can't be queued offline.
  }
}

async function getQueuedFiles() {
  try {
    const db = await openFileDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(FILE_STORE, "readonly");
      const req = tx.objectStore(FILE_STORE).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  } catch (err) {
    return [];
  }
}

async function removeQueuedFile(id) {
  try {
    const db = await openFileDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(FILE_STORE, "readwrite");
      tx.objectStore(FILE_STORE).delete(id);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  } catch (err) {
    // ignore
  }
}

// Replays queued file uploads once we're back online. Returns the results
// so the caller can merge them into React state (new Drive URLs, etc).
async function flushFileQueue() {
  const results = [];
  if (typeof navigator !== "undefined" && !navigator.onLine) return results;
  const queued = await getQueuedFiles();
  for (const record of queued) {
    try {
      const action = record.kind === "profilePhoto" ? "uploadProfilePhoto" : "uploadDocument";
      const res = await callApi(action, {
        ...record.meta,
        fileName: record.fileName,
        mimeType: record.mimeType,
        base64Data: record.base64Data,
      });
      await removeQueuedFile(record.id);
      results.push({ record, res });
    } catch (err) {
      break; // stay offline-safe order; retry the rest next time
    }
  }
  return results;
}

// Reads a File/Blob into a base64 string (no data: prefix).
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Center-crops an image file to a square and re-encodes it as compressed
// JPEG, returning both a base64 string (for upload) and an object URL (for
// instant local preview). Keeps things simple — no manual drag-to-reposition,
// just an automatic center crop, which is enough for a profile photo.
function cropAndCompressImage(file, targetSize = 512, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const side = Math.min(img.width, img.height);
      const sx = (img.width - side) / 2;
      const sy = (img.height - side) / 2;
      const canvas = document.createElement("canvas");
      canvas.width = targetSize;
      canvas.height = targetSize;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, sx, sy, side, side, 0, 0, targetSize, targetSize);
      canvas.toBlob(
        (blob) => {
          const objectUrl = URL.createObjectURL(blob);
          const reader = new FileReader();
          reader.onload = () => resolve({ base64Data: reader.result.split(",")[1], objectUrl, blob });
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        },
        "image/jpeg",
        quality
      );
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

function formatFileSize(bytes) {
  if (!bytes) return "";
  if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

function DocumentUploadSheet({ existingDoc, onClose, onSave }) {
  const isReplace = !!existingDoc;
  const [type, setType] = useState(existingDoc?.type || DOCUMENT_TYPES[0]);
  const [title, setTitle] = useState(existingDoc?.title || "");
  const [date, setDate] = useState(existingDoc?.uploadDate?.slice(0, 10) || new Date().toISOString().slice(0, 10));
  const [notes, setNotes] = useState(existingDoc?.notes || "");
  const [file, setFile] = useState(null);
  const [error, setError] = useState("");

  const handleFile = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > MAX_DOCUMENT_BYTES) {
      setError("That file is larger than 20 MB — please choose a smaller one.");
      setFile(null);
      return;
    }
    setError("");
    setFile(f);
  };

  const canSave = title.trim() && (file || isReplace);

  const handleSave = async () => {
    if (!canSave) return;
    let fileData = null;
    if (file) {
      const base64Data = await fileToBase64(file);
      fileData = { base64Data, fileName: file.name, mimeType: file.type, fileSize: file.size };
    }
    onSave({
      id: existingDoc?.id,
      type,
      title: title.trim(),
      uploadDate: date,
      notes: notes.trim(),
      ...fileData,
    });
  };

  return (
    <div className="fixed inset-0 z-40 flex items-end justify-center max-w-md mx-auto left-0 right-0">
      <div className="absolute inset-0 bg-black/40" onClick={onClose} />

// ---------------------------------------------------------------------------
// Notify Emergency Contacts — preview, recipient selection, privacy
// confirmation, then hand off to SMS / Messenger / clipboard.
// ---------------------------------------------------------------------------
function EmergencyNotifyModal({ message, doctors, contacts, onClose, showToast }) {
  const allRecipients = [...doctors.map((d) => ({ ...d, kind: "Doctor" })), ...contacts.map((c) => ({ ...c, kind: "Emergency" }))];
  const [selectedIds, setSelectedIds] = useState(() => new Set(allRecipients.map((r) => r.id)));
  const [confirmed, setConfirmed] = useState(false);

  const toggleRecipient = (id) => {
    setSelectedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  const selected = allRecipients.filter((r) => selectedIds.has(r.id));

  const handleCopy = async () => {
    try {
      await navigator.clipboard.writeText(message);
      showToast("Message copied");
    } catch (err) {
      showToast("Couldn't copy — please select and copy manually");
    }
  };

  const handleSms = () => {
    const phones = selected.map((r) => r.phone).filter(Boolean).join(",");
    if (!phones) return showToast("No phone numbers selected");
    window.location.href = smsLinkFor(phones, message);
  };

  const handleMessenger = async (recipient) => {
    const link = messengerLinkFor(recipient);
    if (!link) return showToast(`No Messenger info for ${recipient.name}`);
    // Messenger can't be opened with a pre-filled message — copy it first.
    try {
      await navigator.clipboard.writeText(message);
      showToast("Message copied — paste it into Messenger");
    } catch (err) {
      showToast("Opening Messenger — copy the message above first");
    }
    window.open(link, "_blank");
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center max-w-md mx-auto left-0 right-0">
      <div className="absolute inset-0 bg-black/50" onClick={onClose} />
      <div className="relative w-full bg-white rounded-t-[28px] p-6 pb-8 shadow-2xl animate-[slideUp_.2s_ease-out] max-h-[90vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-4">
          <h3 className="app-font-display text-2xl font-bold text-gray-900">
            Notify Emergency Contacts
          </h3>
          <button
            onClick={onClose}
            aria-label="Close"
            className="h-11 w-11 rounded-full bg-gray-100 flex items-center justify-center"
          >
            <XIcon className="h-5 w-5 text-gray-500" />
          </button>
        </div>

        {!confirmed ? (
          <>
            <div className="bg-amber-50 rounded-2xl p-4 flex gap-3 mb-5">
              <AlertTriangleIcon className="h-6 w-6 text-amber-600 shrink-0" />
              <p className="text-lg text-amber-900">
                This will share sensitive medical information with your selected emergency contacts.
              </p>
            </div>

            <p className="text-lg font-bold text-gray-800 mb-2">Send to</p>
            <div className="space-y-2 mb-5">
              {allRecipients.map((r) => (
                <label
                  key={r.id}
                  className="flex items-center gap-3 bg-gray-50 rounded-2xl p-3"
                >
                  <input
                    type="checkbox"
                    checked={selectedIds.has(r.id)}
                    onChange={() => toggleRecipient(r.id)}
                    className="h-6 w-6 shrink-0"
                  />
                  <span className="text-lg font-semibold text-gray-800">{r.name}</span>
                  <span className="text-lg text-gray-400">({r.kind})</span>
                </label>
              ))}
            </div>

            <p className="text-lg font-bold text-gray-800 mb-2">Message preview</p>
            <pre className="whitespace-pre-wrap text-lg text-gray-700 bg-gray-50 rounded-2xl p-4 mb-5 font-sans">
              {message}
            </pre>

            <button
              disabled={selected.length === 0}
              onClick={() => setConfirmed(true)}
              className={`w-full h-16 rounded-2xl text-xl font-bold text-white shadow-md transition-transform active:scale-[0.98] ${
                selected.length > 0 ? "bg-rose-600" : "bg-gray-300"
              }`}
            >
              Continue
            </button>
          </>
        ) : (
          <>
            <p className="text-lg text-gray-500 mb-5">
              Sending to: {selected.map((r) => r.name).join(", ")}
            </p>

            <div className="space-y-3">
              <button
                onClick={handleSms}
                className="w-full h-16 rounded-2xl bg-blue-600 text-white text-xl font-bold flex items-center justify-center gap-2 shadow-md active:scale-[0.98] transition-transform"
              >
                <SendIcon className="h-6 w-6" />
                Send SMS
              </button>

              {selected.filter((r) => messengerLinkFor(r)).map((r) => (
                <button
                  key={r.id}
                  onClick={() => handleMessenger(r)}
                  className="w-full h-16 rounded-2xl bg-white border-2 border-blue-100 text-blue-600 text-xl font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform"
                >
                  <MessengerIcon className="h-6 w-6" />
                  Message {r.name}
                </button>
              ))}

              <button
                onClick={handleCopy}
                className="w-full h-16 rounded-2xl bg-gray-100 text-gray-700 text-xl font-bold flex items-center justify-center gap-2 active:scale-[0.98] transition-transform"
              >
                <ClipboardIcon className="h-6 w-6" />
                Copy Message
              </button>

              <button
                onClick={onClose}
                className="w-full h-14 rounded-2xl text-lg font-semibold text-gray-500"
              >
                Cancel
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Simple hand-rolled SVG line chart (no charting library dependency)
// ---------------------------------------------------------------------------
function VitalsLineChart({ series, height = 180 }) {
  const width = 320;
  const padding = 28;

  const allYs = series.flatMap((s) => s.points.map((p) => p.y));
  if (allYs.length === 0) {
    return (
      <div className="h-40 flex items-center justify-center text-lg text-gray-400">
        Not enough readings yet
      </div>
    );
  }

  const minY = Math.min(...allYs);
  const maxY = Math.max(...allYs);
  const range = maxY - minY || 1;
  const maxLen = Math.max(...series.map((s) => s.points.length), 1);
  const stepX = maxLen > 1 ? (width - 2 * padding) / (maxLen - 1) : 0;

  const toXY = (p, i) => ({
    x: padding + i * stepX,
    y: height - padding - ((p.y - minY) / range) * (height - 2 * padding),
  });

  const firstLabel = series[0].points[0]?.label;
  const lastLabel = series[0].points[series[0].points.length - 1]?.label;

  return (
    <div>
      <svg viewBox={`0 0 ${width} ${height}`} className="w-full" style={{ height }}>
        <line
          x1={padding} y1={height - padding} x2={width - padding} y2={height - padding}
          stroke="#e5e7eb" strokeWidth="1"
        />
        <text x={padding} y={padding - 10} fontSize="11" fill="#9ca3af">{maxY}</text>
        <text x={padding} y={height - padding + 4} fontSize="11" fill="#9ca3af">{minY}</text>

        {series.map((s) => {
          const coords = s.points.map(toXY);
          const path = coords.map((c, i) => (i === 0 ? "M" : "L") + c.x + "," + c.y).join(" ");
          return (
            <g key={s.label}>
              <path d={path} fill="none" stroke={s.color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
              {coords.map((c, i) => (
                <circle key={i} cx={c.x} cy={c.y} r="3.5" fill={s.color} />
              ))}
            </g>
          );
        })}
      </svg>

      <div className="flex items-center justify-between mt-1 px-1">
        <span className="text-sm text-gray-400">{firstLabel || ""}</span>
        <span className="text-sm text-gray-400">{lastLabel || ""}</span>
      </div>

      {series.length > 1 && (
        <div className="flex items-center gap-4 mt-3 px-1">
          {series.map((s) => (
            <div key={s.label} className="flex items-center gap-2">
              <span className="h-3 w-3 rounded-full" style={{ backgroundColor: s.color }} />
              <span className="text-sm font-semibold text-gray-600">{s.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ---------------------------------------------------------------------------
// Emergency notification helpers
// ---------------------------------------------------------------------------
function ageFromDob(dob) {
  if (!dob) return null;
  const birth = new Date(dob);
  if (isNaN(birth)) return null;
  const now = new Date();
  let age = now.getFullYear() - birth.getFullYear();
  const m = now.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < birth.getDate())) age--;
  return age;
}

// Messenger has no way to deep-link with a pre-filled message — this just
// resolves which link to open (username takes priority over a raw profile
// URL), and the caller is responsible for copying the message to the
// clipboard first, per Messenger's own limitation.
function messengerLinkFor(contact) {
  if (!contact) return null;
  if (contact.messengerUsername && contact.messengerUsername.trim()) {
    return `https://m.me/${contact.messengerUsername.trim().replace(/^@/, "")}`;
  }
  if (contact.facebookProfileUrl && contact.facebookProfileUrl.trim()) {
    return contact.facebookProfileUrl.trim();
  }
  return null;
}

function smsLinkFor(phone, body) {
  const cleanPhone = (phone || "").replace(/[^\d+]/g, "");
  return `sms:${cleanPhone}?body=${encodeURIComponent(body)}`;
}

function buildEmergencyMessage({ profile, vitals, meds, doctors, contacts, documents }) {
  const lines = [];
  lines.push("🚨 EMERGENCY HEALTH UPDATE");
  lines.push("");
  lines.push("Patient:");
  lines.push(profile.name || profile.nickname || "—");
  const age = ageFromDob(profile.dob);
  if (age !== null) lines.push(`Age: ${age}`);
  if (profile.bloodtype) lines.push(`Blood Type: ${profile.bloodtype}`);
  if (profile.height || profile.weight) {
    lines.push(`${profile.height || "—"} · ${profile.weight || "—"}`);
  }
  lines.push("");

  vitals.forEach((v) => {
    lines.push(`${v.label}:`);
    lines.push(`${v.value} ${v.unit}`);
    lines.push(`(${v.time})`);
    lines.push("");
  });

  lines.push("Current Medications");
  lines.push("");
  if (meds.length === 0) {
    lines.push("• None on file");
  } else {
    meds.forEach((m) => {
      const displayName = m.genericName || m.brandName;
      lines.push(`• ${displayName} ${m.dosageAmount}${m.dosageUnit}`);
    });
  }
  lines.push("");

  if (doctors.length > 0) {
    lines.push("Primary Doctor");
    lines.push("");
    const d = doctors[0];
    lines.push(d.name);
    lines.push(d.phone);
    lines.push("");
  }

  if (contacts.length > 0) {
    lines.push("Emergency Contacts");
    lines.push("");
    contacts.forEach((c) => lines.push(c.name));
    lines.push("");
  }

  if (documents.length > 0) {
    lines.push("Medical Records");
    lines.push("");
    documents.slice(0, 4).forEach((doc) => {
      lines.push(doc.type);
      lines.push(doc.driveUrl ? doc.driveUrl : "(will be available once synced online)");
      lines.push("");
    });
  }

  lines.push(`Generated ${new Date().toLocaleString()}`);
  return lines.join("\n");
}


const EMAIL_PATTERN = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

function LoginScreen({ onSignIn }) {
  const [email, setEmail] = useState("");
  const [touched, setTouched] = useState(false);

  const isValid = EMAIL_PATTERN.test(email.trim());

  const handleSubmit = () => {
    setTouched(true);
    if (!isValid) return;
    onSignIn(email.trim().toLowerCase());
  };

  return (
    <div className="min-h-screen w-full flex justify-center items-center bg-gray-100 app-font px-5">
      <div className="w-full max-w-md">
        <div className="bg-white rounded-3xl shadow-xl p-8 flex flex-col items-center">
          <img
            src="icons/icon-header.png"
            alt="Mama's Health App"
            className="h-20 w-20 rounded-2xl shadow-md mb-5"
          />
          <h1 className="app-font-display text-2xl font-bold text-gray-900 text-center">
            Mama's Health App
          </h1>
          <p className="text-lg text-gray-500 text-center mt-2 mb-7">
            Enter your email to sign in
          </p>

          <div className="w-full">
            <label className="text-lg font-medium text-gray-600">Email address</label>
            <div className="mt-2 relative">
              <span className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
                <MailIcon className="h-5 w-5" />
              </span>
              <input
                type="email"
                inputMode="email"
                autoCapitalize="none"
                autoCorrect="off"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                onKeyDown={(e) => e.key === "Enter" && handleSubmit()}
                onBlur={() => setTouched(true)}
                placeholder="you@example.com"
                className="w-full h-14 text-lg font-semibold pl-12 pr-4 rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
              />
            </div>
            {touched && !isValid && (
              <p className="text-lg text-rose-600 mt-2">Please enter a valid email address</p>
            )}
          </div>

          <button
            onClick={handleSubmit}
            className="mt-6 w-full h-16 rounded-2xl bg-blue-600 text-white text-xl font-bold shadow-md active:scale-[0.98] transition-transform"
          >
            Sign In
          </button>
        </div>

        <p className="text-center text-lg text-gray-400 mt-6">
          No account needed — just your email to get started.
        </p>
      </div>
    </div>
  );
}

function MamasHealthApp({ userEmail, initialTab, onSignOut }) {
  const [vitals, setVitals] = useState(() => loadLocal("vitals", MOCK_VITALS));
  const [meds, setMeds] = useState(() => loadLocal("medications", MOCK_MEDS));
  const [doseLog, setDoseLog] = useState(() => loadLocal("doseLog", MOCK_DOSE_LOG));
  const [activeTab, setActiveTab] = useState(initialTab || "home");
  const [toast, setToast] = useState(null);
  const [loggingVital, setLoggingVital] = useState(null);
  const [editingMed, setEditingMed] = useState(null); // med object, or {} for new
  const [deletingMed, setDeletingMed] = useState(null);
  const [loading, setLoading] = useState(isBackendConfigured());
  const [history, setHistory] = useState(() => loadLocal("history", []));
  const [historyLoading, setHistoryLoading] = useState(false);
  const [reportVital, setReportVital] = useState("bp");

  const [profile, setProfile] = useState(() => loadLocal("profile", MOCK_PROFILE));
  const [doctors, setDoctors] = useState(() => loadLocal("doctors", MOCK_DOCTORS));
  const [emergencyContacts, setEmergencyContacts] = useState(() =>
    loadLocal("emergencyContacts", MOCK_EMERGENCY_CONTACTS)
  );
  const [profileLoading, setProfileLoading] = useState(false);
  const [editingProfile, setEditingProfile] = useState(false);
  const [editingContact, setEditingContact] = useState(null); // {type, ...} or existing contact
  const [deletingContact, setDeletingContact] = useState(null);

  const [documents, setDocuments] = useState(() => loadLocal("documents", MOCK_DOCUMENTS));
  const [uploadingDocument, setUploadingDocument] = useState(null); // {} for new, doc for replace, or null
  const [deletingDocument, setDeletingDocument] = useState(null);
  const [photoUploading, setPhotoUploading] = useState(false);
  const [showEmergencyModal, setShowEmergencyModal] = useState(false);

  const [isOnline, setIsOnline] = useState(() =>
    typeof navigator !== "undefined" ? navigator.onLine : true
  );
  const [pendingCount, setPendingCount] = useState(() => getQueue().length);

  const showToast = useCallback((message) => {
    setToast(message);
    window.setTimeout(() => setToast(null), 2200);
  }, []);

  // Track connectivity, and sweep the pending-sync queue whenever we come
  // back online so nothing typed offline gets stuck.
  useEffect(() => {
    const goOnline = async () => {
      setIsOnline(true);
      const remaining = await flushQueue();
      setPendingCount(remaining);
      const fileResults = await flushFileQueue();
      if (fileResults.length > 0) {
        setDocuments((prev) =>
          prev.map((doc) => {
            const match = fileResults.find((r) => r.record.meta.id === doc.id);
            return match && match.res ? { ...doc, driveUrl: match.res.driveUrl, driveFileId: match.res.driveFileId } : doc;
          })
        );
      }
      if (remaining === 0) showToast("Back online — your changes are synced");
    };
    const goOffline = () => setIsOnline(false);
    window.addEventListener("online", goOnline);
    window.addEventListener("offline", goOffline);
    return () => {
      window.removeEventListener("online", goOnline);
      window.removeEventListener("offline", goOffline);
    };
  }, [showToast]);

  // Register this sign-in with the Users sheet. Uses the same offline queue
  // as every other write, so it still lands in the Sheet once back online.
  useEffect(() => {
    if (!userEmail) return;
    performApiAction("loginUser", { email: userEmail }, setPendingCount);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [userEmail]);

  // Keep every dataset mirrored to local storage so a reload — online or
  // offline — always shows the most recent entries, even unsynced ones.
  useEffect(() => saveLocal("vitals", vitals), [vitals]);
  useEffect(() => saveLocal("medications", meds), [meds]);
  useEffect(() => saveLocal("doseLog", doseLog), [doseLog]);
  useEffect(() => saveLocal("history", history), [history]);
  useEffect(() => saveLocal("profile", profile), [profile]);
  useEffect(() => saveLocal("doctors", doctors), [doctors]);
  useEffect(() => saveLocal("emergencyContacts", emergencyContacts), [emergencyContacts]);
  useEffect(() => saveLocal("documents", documents), [documents]);

  useEffect(() => {
    if (!isBackendConfigured()) return;
    (async () => {
      if (typeof navigator !== "undefined" && navigator.onLine) {
        const remaining = await flushQueue();
        setPendingCount(remaining);
      }
      try {
        const data = await fetchApi("getData");
        if (data && data.vitals) {
          setVitals(
            data.vitals.map((v) => ({
              ...v,
              icon: VITAL_ICONS[v.id],
              accent: VITAL_STYLE[v.id]?.accent,
              ring: VITAL_STYLE[v.id]?.ring,
              chip:
                v.status === "Normal"
                  ? "bg-green-100 text-green-800"
                  : "bg-amber-100 text-amber-800",
            }))
          );
        }
        if (data && data.medications) setMeds(data.medications);
        if (data && data.doseLog) setDoseLog(data.doseLog);
      } catch (err) {
        showToast(
          pendingCount > 0
            ? "Offline — showing your saved entries"
            : "Could not reach the server — showing saved data"
        );
      } finally {
        setLoading(false);
      }
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [showToast]);

  const toggleDose = async (medicationId, time) => {
    const key = doseKey(medicationId, time);
    let nextTaken = true;
    setDoseLog((prev) => {
      const existing = prev.find((d) => doseKey(d.medicationId, d.time) === key);
      if (existing) {
        nextTaken = !existing.taken;
        return prev.map((d) =>
          doseKey(d.medicationId, d.time) === key ? { ...d, taken: nextTaken } : d
        );
      }
      nextTaken = true;
      return [...prev, { medicationId, time, taken: true }];
    });
    await performApiAction(
      "toggleDose",
      { medicationId, time, taken: nextTaken },
      setPendingCount
    );
  };

  const saveVital = async (vitalId, value) => {
    setLoggingVital(null);
    const now = new Date();
    const timeLabel = `Today, ${now.toLocaleTimeString([], {
      hour: "numeric",
      minute: "2-digit",
    })}`;
    setVitals((prev) =>
      prev.map((v) => (v.id === vitalId ? { ...v, value, time: timeLabel } : v))
    );
    showToast(isOnline ? "Reading saved" : "Reading saved — will sync when online");
    await performApiAction(
      "logVital",
      { id: vitalId, value, timestamp: now.toISOString() },
      setPendingCount
    );
  };

  const saveMed = async (med) => {
    setEditingMed(null);
    const isNew = !med.id;

    if (isNew) {
      const tempId = "temp_" + Date.now();
      setMeds((prev) => [...prev, { ...med, id: tempId }]);
      showToast(isOnline ? "Medication added" : "Medication added — will sync when online");
      const res = await performApiAction("addMedication", med, setPendingCount);
      if (res && res.id) {
        setMeds((prev) => prev.map((m) => (m.id === tempId ? { ...m, id: res.id } : m)));
      }
      return;
    }

    setMeds((prev) => prev.map((m) => (m.id === med.id ? med : m)));
    showToast(isOnline ? "Medication updated" : "Medication updated — will sync when online");
    await performApiAction("updateMedication", med, setPendingCount);
  };

  const confirmDeleteMed = async (med) => {
    setDeletingMed(null);
    setEditingMed(null);
    setMeds((prev) => prev.filter((m) => m.id !== med.id));
    setDoseLog((prev) => prev.filter((d) => d.medicationId !== med.id));
    showToast(isOnline ? "Medication deleted" : "Medication deleted — will sync when online");
    await performApiAction("deleteMedication", { id: med.id }, setPendingCount);
  };

  useEffect(() => {
    if (activeTab !== "reports" || !isBackendConfigured()) return;
    setHistoryLoading(true);
    (async () => {
      try {
        const data = await fetchApi("getVitalsHistory");
        if (data && data.history) setHistory(data.history);
      } catch (err) {
        if (history.length === 0) showToast("Offline — no saved history yet");
      } finally {
        setHistoryLoading(false);
      }
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeTab, showToast]);

  useEffect(() => {
    if (activeTab !== "settings" || !isBackendConfigured()) return;
    setProfileLoading(true);
    (async () => {
      try {
        const data = await fetchApi("getProfile");
        if (data && data.profile) setProfile(data.profile);
        if (data && data.doctors) setDoctors(data.doctors);
        if (data && data.emergencyContacts) setEmergencyContacts(data.emergencyContacts);
      } catch (err) {
        showToast("Offline — showing your saved profile");
      } finally {
        setProfileLoading(false);
      }
      try {
        const docData = await fetchApi("getDocuments");
        if (docData && docData.documents) setDocuments(docData.documents);
      } catch (err) {
        // Offline — keep showing whatever's cached locally.
      }
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeTab, showToast]);

  const saveProfile = async (updated) => {
    setEditingProfile(false);
    setProfile({ ...updated, bloodtype: updated.bloodType });
    showToast(isOnline ? "Profile updated" : "Profile updated — will sync when online");
    await performApiAction("updateProfile", updated, setPendingCount);
  };

  const saveContact = async (contact) => {
    setEditingContact(null);
    const isNew = !contact.id;
    const listSetter = contact.type === "Doctor" ? setDoctors : setEmergencyContacts;
    const label = contact.type === "Doctor" ? "Doctor" : "Contact";

    if (isNew) {
      const tempId = "temp_" + Date.now();
      listSetter((prev) => [...prev, { ...contact, id: tempId }]);
      showToast(isOnline ? `${label} added` : `${label} added — will sync when online`);
      const res = await performApiAction("addContact", contact, setPendingCount);
      if (res && res.id) {
        listSetter((prev) => prev.map((c) => (c.id === tempId ? { ...c, id: res.id } : c)));
      }
      return;
    }

    listSetter((prev) => prev.map((c) => (c.id === contact.id ? contact : c)));
    showToast(isOnline ? `${label} updated` : `${label} updated — will sync when online`);
    await performApiAction("updateContact", contact, setPendingCount);
  };

  const confirmDeleteContact = async (contact) => {
    setDeletingContact(null);
    setEditingContact(null);
    const listSetter = contact.type === "Doctor" ? setDoctors : setEmergencyContacts;
    listSetter((prev) => prev.filter((c) => c.id !== contact.id));
    showToast(isOnline ? "Contact removed" : "Contact removed — will sync when online");
    await performApiAction("deleteContact", { id: contact.id }, setPendingCount);
  };

  const saveDocument = async (doc) => {
    setUploadingDocument(null);
    const isNew = !doc.id;
    const { base64Data, fileName, mimeType, fileSize, ...meta } = doc;

    if (isNew) {
      const tempId = "temp_" + Date.now();
      const localEntry = {
        id: tempId,
        type: meta.type,
        title: meta.title,
        notes: meta.notes,
        uploadDate: meta.uploadDate,
        fileName,
        fileSize,
        driveUrl: "",
        driveFileId: "",
      };
      setDocuments((prev) => [localEntry, ...prev]);

      if (!isOnline) {
        await queueFileUpload({
          id: tempId,
          kind: "document",
          meta: { id: tempId, type: meta.type, title: meta.title, notes: meta.notes, uploadDate: meta.uploadDate, uploadedBy: userEmail },
          base64Data,
          mimeType,
          fileName,
        });
        showToast("Document saved — will upload when online");
        return;
      }

      showToast("Uploading document…");
      try {
        const res = await callApi("uploadDocument", { ...meta, fileName, mimeType, base64Data, uploadedBy: userEmail });
        if (res && res.id) {
          setDocuments((prev) =>
            prev.map((d) => (d.id === tempId ? { ...d, id: res.id, driveUrl: res.driveUrl, driveFileId: res.driveFileId } : d))
          );
          showToast("Document uploaded");
        }
      } catch (err) {
        await queueFileUpload({
          id: tempId,
          kind: "document",
          meta: { id: tempId, type: meta.type, title: meta.title, notes: meta.notes, uploadDate: meta.uploadDate, uploadedBy: userEmail },
          base64Data,
          mimeType,
          fileName,
        });
        showToast("Upload failed — will retry automatically");
      }
      return;
    }

    // Replacing an existing document's metadata and/or file
    setDocuments((prev) => prev.map((d) => (d.id === doc.id ? { ...d, ...meta, fileName: fileName || d.fileName } : d)));
    showToast(isOnline ? "Document updated" : "Document updated — will sync when online");
    await performApiAction("updateDocument", { id: doc.id, ...meta, fileName, mimeType, base64Data }, setPendingCount);
  };

  const confirmDeleteDocument = async (doc) => {
    setDeletingDocument(null);
    setDocuments((prev) => prev.filter((d) => d.id !== doc.id));
    showToast(isOnline ? "Document deleted" : "Document deleted — will sync when online");
    await performApiAction("deleteDocument", { id: doc.id }, setPendingCount);
  };

  const savePhoto = async (file) => {
    setPhotoUploading(true);
    try {
      const { base64Data, objectUrl } = await cropAndCompressImage(file);
      setProfile((prev) => ({ ...prev, profilephotourl: objectUrl }));

      if (!isOnline) {
        await queueFileUpload({
          id: "profile_photo",
          kind: "profilePhoto",
          meta: {},
          base64Data,
          mimeType: "image/jpeg",
          fileName: "profile-photo.jpg",
        });
        showToast("Photo saved — will upload when online");
        return;
      }

      const res = await callApi("uploadProfilePhoto", {
        base64Data,
        mimeType: "image/jpeg",
        fileName: "profile-photo.jpg",
      });
      if (res && res.driveUrl) {
        setProfile((prev) => ({ ...prev, profilephotourl: res.driveUrl }));
        showToast("Photo updated");
      }
    } catch (err) {
      showToast("Couldn't process that photo — please try another");
    } finally {
      setPhotoUploading(false);
    }
  };

  // Expand each medicine's specific times into individual "doses" for today,
  // and group them into Morning/Afternoon/Evening for a scannable layout —
  // while still keeping the real clock time on each row.
  const todayDoses = meds
    .flatMap((m) =>
      m.times.map((time) => {
        const entry = doseLog.find((d) => d.medicationId === m.id && d.time === time);
        return {
          med: m,
          time,
          taken: entry ? entry.taken : false,
          period: periodForTime(time),
        };
      })
    )
    .sort((a, b) => a.time.localeCompare(b.time));

  const dosesByPeriod = { Morning: [], Afternoon: [], Evening: [] };
  todayDoses.forEach((d) => dosesByPeriod[d.period].push(d));

  const totalMeds = todayDoses.length;
  const takenMeds = todayDoses.filter((d) => d.taken).length;

  return (
    <div className="min-h-screen w-full flex justify-center bg-gray-100 app-font">
      <div className="w-full max-w-md min-h-screen bg-[#F8F9FC] relative shadow-2xl overflow-hidden">
        {/* ---------------- Top App Bar ---------------- */}
        <header className="px-5 pt-6 pb-5 bg-white rounded-b-[28px] shadow-sm sticky top-0 z-20">
          <div className="flex items-center gap-2 mb-3">
            <img
              src="icons/icon-header.png"
              alt="Mama's Health App"
              className="h-9 w-9 rounded-2xl shadow"
            />
            <p className="text-sm font-bold tracking-wide text-blue-600 uppercase">
              Mama's Health App
            </p>
          </div>
          <div className="flex items-start justify-between">
            <div>
              <p className="app-font-display text-2xl font-bold text-gray-900 leading-tight">
                Good morning,
              </p>
              <p className="app-font-display text-2xl font-bold text-blue-600 leading-tight">
                {profile.nickname || profile.name?.split(" ")[0] || "there"}
              </p>
              <p className="text-lg text-gray-500 mt-1">
                {new Date().toLocaleDateString(undefined, {
                  weekday: "long",
                  month: "long",
                  day: "numeric",
                })}
              </p>
            </div>
            <label
              aria-label="Update your photo"
              className="h-12 w-12 rounded-full bg-blue-600 ring-4 ring-blue-50 flex items-center justify-center shadow-md overflow-hidden cursor-pointer relative"
            >
              {profile.profilephotourl ? (
                <img src={profile.profilephotourl} alt="" className="h-full w-full object-cover" />
              ) : (
                <span className="text-white text-lg font-bold">
                  {(profile.nickname || profile.name || "?").charAt(0).toUpperCase()}
                </span>
              )}
              {photoUploading && (
                <span className="absolute inset-0 bg-black/40 flex items-center justify-center">
                  <CameraIcon className="h-5 w-5 text-white" />
                </span>
              )}
              <input
                type="file"
                accept="image/*"
                className="hidden"
                onChange={(e) => e.target.files[0] && savePhoto(e.target.files[0])}
              />
            </label>
          </div>
        </header>

        {/* Offline / pending-sync banner */}
        {(!isOnline || pendingCount > 0) && (
          <div
            className={`mx-5 mt-4 rounded-2xl px-4 py-3 flex items-center gap-3 ${
              isOnline ? "bg-blue-50" : "bg-amber-50"
            }`}
          >
            <span
              className={`h-9 w-9 rounded-full flex items-center justify-center shrink-0 ${
                isOnline ? "bg-blue-100" : "bg-amber-100"
              }`}
            >
              <CloudOffIcon className={`h-5 w-5 ${isOnline ? "text-blue-600" : "text-amber-600"}`} />
            </span>
            <p className={`text-lg font-medium ${isOnline ? "text-blue-900" : "text-amber-900"}`}>
              {!isOnline
                ? "You're offline. Entries you make now are saved and will sync automatically."
                : `Syncing ${pendingCount} saved ${pendingCount === 1 ? "change" : "changes"}…`}
            </p>
          </div>
        )}

        {/* ---------------- Content ---------------- */}
        <main className="px-5 pb-32 pt-6 space-y-8">
          {loading && (
            <p className="text-center text-lg text-gray-400">Loading today's data…</p>
          )}

          {activeTab === "home" && (
            <>
              <button
                onClick={() => setShowEmergencyModal(true)}
                className="w-full h-16 rounded-2xl bg-rose-600 text-white text-xl font-bold flex items-center justify-center gap-2 shadow-md active:scale-[0.98] transition-transform"
              >
                <AlertTriangleIcon className="h-6 w-6" />
                Notify Emergency Contacts
              </button>

              {/* Vitals */}
              <section>
                <h2 className="app-font-display text-2xl font-bold text-gray-900 mb-4">
                  Today's Vitals
                </h2>
                <div className="space-y-4">
                  {vitals.map((v) => {
                    const IconComp = v.icon || VITAL_ICONS[v.id];
                    return (
                      <div key={v.id} className={`bg-white rounded-3xl shadow-md p-5 ring-1 ${v.ring}`}>
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-3">
                            <span className="h-12 w-12 rounded-2xl bg-gray-50 flex items-center justify-center">
                              <IconComp className={`h-7 w-7 ${v.accent}`} />
                            </span>
                            <div>
                              <p className="text-lg font-semibold text-gray-700">{v.label}</p>
                              <p className="text-sm text-gray-400">{v.time}</p>
                            </div>
                          </div>
                          <span className={`px-3 py-1 rounded-full text-sm font-bold ${v.chip}`}>
                            {v.status}
                          </span>
                        </div>

                        <div className="mt-4 flex items-end justify-between">

              { key: "settings", label: "Settings", icon: SettingsIcon },
            ].map((tab) => {
              const TabIcon = tab.icon;
              const active = activeTab === tab.key;
              return (
                <button
                  key={tab.key}
                  onClick={() => setActiveTab(tab.key)}
                  className="flex flex-col items-center gap-1 flex-1 py-1"
                >
                  <span className={`h-10 w-16 rounded-full flex items-center justify-center transition-colors ${active ? "bg-blue-100" : ""}`}>
                    <TabIcon
                      className={`h-6 w-6 ${active ? "text-blue-700" : "text-gray-400"}`}
                      strokeWidth={active ? 2.5 : 2}
                    />
                  </span>
                  <span className={`text-sm font-semibold ${active ? "text-blue-700" : "text-gray-400"}`}>
                    {tab.label}
                  </span>
                </button>
              );
            })}
          </div>
        </nav>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Session wrapper — decides whether to show the login screen or the app.
// The signed-in email is just stored locally (no password, no OAuth); it's
// only used to identify the caregiver on the patient profile screen and to
// register a row in the Users sheet.
// ---------------------------------------------------------------------------
// True only the very first time this app has ever launched on this device
// — not just "profile is empty," which could also happen on a brand-new
// device that's actually talking to a Sheet someone else already filled in.
function isTrueFirstRun() {
  if (loadLocal("hasLaunched", false)) return false;
  // Backward-compat: if there's already real cached data from before this
  // flag existed, this isn't actually a first run either.
  const hasExistingData =
    loadLocal("session", null) ||
    loadLocal("profile", null) ||
    loadLocal("medications", null) ||
    loadLocal("vitals", null);
  return !hasExistingData;
}

function AppRoot() {
  const [userEmail, setUserEmail] = useState(() => loadLocal("session", null));
  // Captured once, before the effect below marks the app as launched.
  const [wasFirstRun] = useState(() => isTrueFirstRun());
  const [landOnProfile, setLandOnProfile] = useState(false);

  useEffect(() => {
    saveLocal("hasLaunched", true);
  }, []);

  const handleSignIn = (email) => {
    saveLocal("session", email);
    setUserEmail(email);
    // Home by default — only a true first run routes through Patient
    // Profile first. A returning caregiver, or a new device signing into
    // an already-set-up patient, both land on Home like any normal day.
    setLandOnProfile(wasFirstRun);
  };

  const handleSignOut = () => {
    saveLocal("session", null);
    setUserEmail(null);
    setLandOnProfile(false);
  };

  if (!userEmail) {
    return <LoginScreen onSignIn={handleSignIn} />;
  }

  return (
    <MamasHealthApp
      userEmail={userEmail}
      initialTab={landOnProfile ? "settings" : "home"}
      onSignOut={handleSignOut}
    />
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppRoot />);
</script>
<script>
  // Manually compile the JSX source above using the classic runtime
  // (React.createElement), which matches the UMD React/ReactDOM builds
  // loaded from unpkg. This avoids Babel's newer "automatic" JSX runtime,
  // which injects an `import` statement that plain <script> tags can't run.
  (function () {
    var source = document.getElementById("app-source").textContent;
    var compiled = Babel.transform(source, {
      presets: [["react", { runtime: "classic" }]],
      filename: "mamas-health-app.jsx",
    }).code;
    var script = document.createElement("script");
    script.text = compiled;
    document.body.appendChild(script);
  })();
</script>
<script>
  // Caches the app shell + CDN assets (React, Babel, fonts) so the page
  // itself still loads with no network at all — not just the data inside it.
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function () {
        // Offline data entry still works without the service worker; it
        // just means the app shell needs one online load to be cached.
      });
    });
  }
</script>
