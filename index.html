function periodForTime(timeStr) {
  const hour = parseInt(String(timeStr).split(":")[0], 10);
  if (isNaN(hour)) return "Morning";
  if (hour < 12) return "Morning";       // 12:00 AM - 11:59 AM
  if (hour < 18) return "Afternoon";     // 12:00 PM - 5:59 PM
  return "Evening";                      // 6:00 PM - 11:59 PM
}

function currentPeriod() {
  const now = new Date();
  return periodForTime(`${now.getHours()}:00`);
}

// Local (device) calendar date as "yyyy-MM-dd" — used to detect when the
// cached doseLog/confirmedPeriods are from a previous day and should be
// discarded rather than carried forward. This is what actually caused
// yesterday's fully-ticked doses to reappear (and immediately trigger a
// confirm prompt) the next time the app was opened: the local cache had
// no concept of "which day is this for," so a fresh day's initial render
// still showed yesterday's state until the server fetch resolved — and
// worse, the merge logic on that fetch treated any locally-cached tick
// for a period the server hadn't confirmed *today* as still "in
// progress," so it survived the merge instead of being wiped.
function todayLocalDateString() {
  const now = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
}

function formatTime12h(timeStr) {
  const [hStr, mStr] = String(timeStr).split(":");
  let h = parseInt(hStr, 10);
  const m = mStr || "00";
  if (isNaN(h)) return timeStr;
  const suffix = h >= 12 ? "PM" : "AM";
  h = h % 12;
  if (h === 0) h = 12;
  return `${h}:${m} ${suffix}`;
}

const isBackendConfigured = () =>
  API_URL && API_URL.indexOf("PASTE_YOUR_APPS_SCRIPT") === -1;

// ---------------------------------------------------------------------------
// Multi-user: every signed-in email is its own separate account with its
// own data (own vitals, own medications, everything) — not a shared
// patient. currentUserEmail is set once at sign-in (see AppRoot) and read
// automatically by every API call and every local-storage read/write below,
// so the rest of the app never has to thread it through by hand.
// ---------------------------------------------------------------------------
let currentUserEmail = null;
function setCurrentUserEmail(email) {
  currentUserEmail = email || null;
}

// The phone's real timezone (e.g. "Asia/Manila"), computed once. Sent with
// every request so the backend formats/matches dates using where the phone
// actually is — Google Apps Script's own default (Session.getScriptTimeZone())
// reflects whatever timezone the Google Sheet itself happens to be set to,
// which has nothing to do with the device using the app.
const CLIENT_TIMEZONE =
  (typeof Intl !== "undefined" && Intl.DateTimeFormat().resolvedOptions().timeZone) || "UTC";

// Supabase Edge Function helper. overrideEmail lets a queued/replayed
// action carry the email it was originally made under, even if a
// different user is signed in by the time it actually gets sent.
async function callApi(action, payload, overrideEmail) {
  if (!isBackendConfigured()) return null;
  const res = await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + SUPABASE_ANON_KEY,
    },
    body: JSON.stringify({
      action,
      ...payload,
      email: overrideEmail || currentUserEmail,
      timezone: CLIENT_TIMEZONE,
    }),
  });
  return res.json();
}

async function fetchApi(action, overrideEmail) {
  if (!isBackendConfigured()) return null;
  const email = encodeURIComponent(overrideEmail || currentUserEmail || "");
  const timezone = encodeURIComponent(CLIENT_TIMEZONE);
  const res = await fetch(`${API_URL}?action=${action}&email=${email}&timezone=${timezone}`, {
    headers: { "Authorization": "Bearer " + SUPABASE_ANON_KEY },
  });
  return res.json();
}

// ---------------------------------------------------------------------------
// Offline support: local cache of the last-known data, plus a queue of
// writes made while offline (or while a request fails), replayed once the
// connection comes back.
//
// Every cache key below is namespaced per signed-in user (so two different
// people signing into the same shared device/browser never see each
// other's cached data) — except a small blocklist of truly device-level
// keys (the current session itself, whether the app has ever launched
// before, and the sync queue, which now carries its own per-item email).
// ---------------------------------------------------------------------------
const STORAGE_PREFIX = "mamahq:";
const GLOBAL_STORAGE_KEYS = new Set(["session", "hasLaunched", "pendingSync"]);

function storageKeyFor(key) {
  if (GLOBAL_STORAGE_KEYS.has(key)) return key;
  return currentUserEmail ? `${currentUserEmail}:${key}` : key;
}

function loadLocal(key, fallback) {
  try {
    const raw = window.localStorage.getItem(STORAGE_PREFIX + storageKeyFor(key));
    return raw ? JSON.parse(raw) : fallback;
  } catch (err) {
    // Storage may be unavailable (private browsing, restricted preview, etc).
    return fallback;
  }
}

function saveLocal(key, value) {
  try {
    window.localStorage.setItem(STORAGE_PREFIX + storageKeyFor(key), JSON.stringify(value));
  } catch (err) {
    // Ignore — the app still works in-memory for this session.
  }
}

function getQueue() {
  return loadLocal("pendingSync", []);
}

function queueAction(action, payload) {
  const queue = getQueue();
  queue.push({
    id: "q_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8),
    action,
    payload,
    email: currentUserEmail, // captured now, so a later account switch can't misattribute this
    queuedAt: new Date().toISOString(),
  });
  saveLocal("pendingSync", queue);
  return queue.length;
}

// Replays queued writes in the order they were made. Stops at the first
// failure so a later change can't overwrite an earlier one out of order —
// it will simply retry from there next time we're back online.
async function flushQueue() {
  let queue = getQueue();
  while (queue.length > 0 && typeof navigator !== "undefined" && navigator.onLine) {
    const item = queue[0];
    try {
      await callApi(item.action, item.payload, item.email);
      queue = queue.slice(1);
      saveLocal("pendingSync", queue);
    } catch (err) {
      break;
    }
  }
  return queue.length;
}

// Every write in this app goes through here instead of calling callApi
// directly: if we're offline, or the request fails, the change is queued
// locally and retried automatically once the connection returns.
async function performApiAction(action, payload, onQueued) {
  if (!isBackendConfigured()) return null;
  if (typeof navigator !== "undefined" && !navigator.onLine) {
    const n = queueAction(action, payload);
    if (onQueued) onQueued(n);
    return null;
  }
  try {
    return await callApi(action, payload);
  } catch (err) {
    const n = queueAction(action, payload);
    if (onQueued) onQueued(n);
    return null;
  }
}

// ---------------------------------------------------------------------------
// File uploads (medical documents, profile photo) use a SEPARATE offline
// queue backed by IndexedDB, not the localStorage queue above. Browsers cap
// localStorage around 5-10MB total for the whole origin — a single 20MB
// document would blow that instantly. IndexedDB has a much larger practical
// quota and can store binary data directly, so it's the right tool for
// "let me upload this later when I'm back online."
// ---------------------------------------------------------------------------
const FILE_DB_NAME = "mamahq-files";
const FILE_STORE = "pendingFiles";

function openFileDB() {
  return new Promise((resolve, reject) => {
    if (!("indexedDB" in window)) return reject(new Error("IndexedDB unavailable"));
    const req = indexedDB.open(FILE_DB_NAME, 1);
    req.onupgradeneeded = () => {
      req.result.createObjectStore(FILE_STORE, { keyPath: "id" });
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function queueFileUpload(record) {
  // record: { id, kind: "document"|"profilePhoto", meta, base64Data, mimeType, fileName }
  // email is captured now, same as the JSON action queue, so a later
  // account switch on the same device can't misattribute this upload.
  const recordWithEmail = { ...record, email: currentUserEmail };
  try {
    const db = await openFileDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(FILE_STORE, "readwrite");
      tx.objectStore(FILE_STORE).put(recordWithEmail);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  } catch (err) {
    // IndexedDB unavailable — the upload simply can't be queued offline.
  }
}

async function getQueuedFiles() {
  try {
    const db = await openFileDB();
    return await new Promise((resolve, reject) => {
      const tx = db.transaction(FILE_STORE, "readonly");
      const req = tx.objectStore(FILE_STORE).getAll();
      req.onsuccess = () => resolve(req.result || []);
      req.onerror = () => reject(req.error);
    });
  } catch (err) {
    return [];
  }
}

async function removeQueuedFile(id) {
  try {
    const db = await openFileDB();
    await new Promise((resolve, reject) => {
      const tx = db.transaction(FILE_STORE, "readwrite");
      tx.objectStore(FILE_STORE).delete(id);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    });
  } catch (err) {
    // ignore
  }
}

// Replays queued file uploads once we're back online. Returns the results
// so the caller can merge them into React state (new Drive URLs, etc).
async function flushFileQueue() {
  const results = [];
  if (typeof navigator !== "undefined" && !navigator.onLine) return results;
  const queued = await getQueuedFiles();
  for (const record of queued) {
    try {
      const action = record.kind === "profilePhoto" ? "uploadProfilePhoto" : "uploadDocument";
      const res = await callApi(
        action,
        {
          ...record.meta,
          fileName: record.fileName,
          mimeType: record.mimeType,
          base64Data: record.base64Data,
        },
        record.email
      );
      await removeQueuedFile(record.id);
      results.push({ record, res });
    } catch (err) {
      break; // stay offline-safe order; retry the rest next time
    }
  }
  return results;
}

// Reads a File/Blob into a base64 string (no data: prefix).
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Center-crops an image file to a square and re-encodes it as compressed
// JPEG, returning both a base64 string (for upload) and an object URL (for
// instant local preview). Keeps things simple — no manual drag-to-reposition,
// just an automatic center crop, which is enough for a profile photo.
function cropAndCompressImage(file, targetSize = 512, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const side = Math.min(img.width, img.height);
      const sx = (img.width - side) / 2;
      const sy = (img.height - side) / 2;
      const canvas = document.createElement("canvas");
      canvas.width = targetSize;
      canvas.height = targetSize;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, sx, sy, side, side, 0, 0, targetSize, targetSize);
      canvas.toBlob(
        (blob) => {
          const objectUrl = URL.createObjectURL(blob);
          const reader = new FileReader();
          reader.onload = () => resolve({ base64Data: reader.result.split(",")[1], objectUrl, blob });
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        },
        "image/jpeg",
        quality
      );
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

function formatFileSize(bytes) {
  if (!bytes) return "";
  if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

// Sugar is entered by the person in mmol/L (the unit used in many
// countries), but stored internally in mg/dL — that's what the backend's
// thresholds and the Sheet's Unit column are built around. Displayed as
// mmol/L first, with the mg/dL equivalent alongside for reference.
function formatSugarDual(value, unit) {
  if (unit !== "mg/dL") return `${value} ${unit}`;
  const num = Number(value);
  if (!value || isNaN(num)) return `${value} ${unit}`;
  const mmol = (num / 18).toFixed(1);
  return `${mmol} mmol/L (${value} mg/dL)`;
}

// ---------------------------------------------------------------------------
// Medication reminders via .ics calendar file
// ---------------------------------------------------------------------------
// A website has no way to write directly into the phone's own Clock/Alarm
// app — that's only reachable by a native app. The closest real, working
// equivalent is generating a calendar file with a recurring daily event and
// an alarm attached; iOS and Android both turn that into a genuine
// lock-screen notification at dose time once it's added to Calendar. This
// is the same mechanism used by every "add to calendar" reminder button.
function pad2(n) {
  return String(n).padStart(2, "0");
}

function icsEventLines(med, time) {
  const displayName = med.genericName || med.brandName;
  const now = new Date();
  const [h, m] = time.split(":").map(Number);
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
  if (start < now) start.setDate(start.getDate() + 1); // start from the next occurrence
  const dtstart = `${start.getFullYear()}${pad2(start.getMonth() + 1)}${pad2(start.getDate())}T${pad2(h)}${pad2(m)}00`;
  const dtstamp = new Date().toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
  // Attach the phone's real IANA timezone (e.g. "America/Los_Angeles") rather
  // than leaving DTSTART as "floating" time. Floating time with no TZID is
  // interpreted inconsistently across calendar apps — some treat it as UTC,
  // which silently shifts every reminder, and some recurring-event parsers
  // reject it outright. Google Calendar, Apple Calendar, and Outlook all
  // recognize standard IANA zone names here without needing an embedded
  // VTIMEZONE block.
  const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "UTC";

  const lines = [
    "BEGIN:VEVENT",
    `UID:${med.id}-${time.replace(":", "")}@mamashealthapp`,
    `DTSTAMP:${dtstamp}`,
    `DTSTART;TZID=${timezone}:${dtstart}`,
    "DURATION:PT10M",
    "RRULE:FREQ=DAILY",
    `SUMMARY:Take ${displayName} (${med.dosageAmount}${med.dosageUnit})`,
  ];
  if (med.instructions) lines.push(`DESCRIPTION:${med.instructions.replace(/\r?\n/g, " ")}`);
  lines.push(
    "BEGIN:VALARM",
    "ACTION:DISPLAY",
    `DESCRIPTION:Time to take ${displayName}`,
    "TRIGGER:PT0M", // alarm fires exactly at dose time
    "END:VALARM",
    "END:VEVENT"
  );
  return lines;
}

function buildIcsCalendar(events) {
  return [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//d'Gaddi's Health Monitoring//Medication Reminders//EN",
    "CALSCALE:GREGORIAN",
    "METHOD:PUBLISH",
    ...events,
    "END:VCALENDAR",
  ].join("\r\n");
}

function buildIcsForMedication(med) {
  const events = (med.times || []).flatMap((time) => icsEventLines(med, time));
  return buildIcsCalendar(events);
}

function buildIcsForAllMedications(meds) {
  const events = meds.flatMap((med) => (med.times || []).flatMap((time) => icsEventLines(med, time)));
  return buildIcsCalendar(events);
}

function downloadIcs(filename, content) {
  const blob = new Blob([content], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  // Try opening it directly first — on many mobile browsers this lets the
  // OS's own "Add to Calendar" handler take over immediately, which is more
  // reliable than forcing a file download. Only fall back to a forced
  // download (which requires manually opening it afterward from
  // Downloads/Files) if the open attempt was blocked.
  const opened = window.open(url, "_blank");
  if (!opened) {
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  setTimeout(() => URL.revokeObjectURL(url), 10000);
  return !!opened;
}

// ---------------------------------------------------------------------------
// AI Companion — voice output only, using the browser's own built-in
// text-to-speech (no API, no cost). Nothing plays automatically; it only
// speaks when the person taps the speaker icon on a given reply.
// ---------------------------------------------------------------------------
function speakText(text, onEnd) {
  if (!("speechSynthesis" in window)) return false;
  window.speechSynthesis.cancel(); // only one reply speaks at a time
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.onend = onEnd;
  utterance.onerror = onEnd;
  window.speechSynthesis.speak(utterance);
  return true;
}

function stopSpeaking() {
  if ("speechSynthesis" in window) window.speechSynthesis.cancel();
}

function LogVitalSheet({ vital, onClose, onSave }) {
  const [systolic, setSystolic] = useState("");
  const [diastolic, setDiastolic] = useState("");
  const [single, setSingle] = useState("");

  const canSave =
    vital.id === "bp" ? systolic && diastolic : single;

  const handleSave = () => {
    if (!canSave) return;
    if (vital.id === "bp") {
      onSave(vital.id, `${systolic}/${diastolic}`);
    } else if (vital.id === "sugar") {
      // Entered in mmol/L, converted to mg/dL for storage — the backend's
      // thresholds and the Sheet's Unit column are both still mg/dL.
      onSave(vital.id, String(Math.round(Number(single) * 18)));
    } else {
      onSave(vital.id, single);
    }
  };

  return (
    <div className="fixed inset-0 z-40 flex items-end justify-center max-w-md mx-auto left-0 right-0">
      <div
        className="absolute inset-0 bg-black/40"
        onClick={onClose}
      />
      <div className="relative w-full bg-white rounded-t-[28px] p-6 pb-8 shadow-2xl animate-[slideUp_.2s_ease-out]">
        <div className="flex items-center justify-between mb-5">
          <h3 className="app-font-display text-2xl font-bold text-gray-900">
            Log {vital.label}
          </h3>
          <button
            onClick={onClose}
            aria-label="Close"
            className="h-11 w-11 rounded-full bg-gray-100 flex items-center justify-center"
          >
            <XIcon className="h-5 w-5 text-gray-500" />
          </button>
        </div>

        {vital.id === "bp" ? (
          <div className="flex items-center gap-3">
            <div className="flex-1">
              <label className="text-lg font-medium text-gray-600">Systolic</label>
              <input
                type="number"
                inputMode="numeric"
                value={systolic}
                onChange={(e) => setSystolic(e.target.value)}
                placeholder="120"
                className="mt-2 w-full h-16 text-2xl font-bold text-center rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
              />
            </div>
            <span className="text-3xl font-bold text-gray-300 mt-7">/</span>
            <div className="flex-1">
              <label className="text-lg font-medium text-gray-600">Diastolic</label>
              <input
                type="number"
                inputMode="numeric"
                value={diastolic}
                onChange={(e) => setDiastolic(e.target.value)}
                placeholder="80"
                className="mt-2 w-full h-16 text-2xl font-bold text-center rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
              />
            </div>
          </div>
        ) : vital.id === "sugar" ? (
          <div>
            <label className="text-lg font-medium text-gray-600">Sugar (mmol/L)</label>
            <input
              type="number"
              inputMode="decimal"
              step="0.1"
              value={single}
              onChange={(e) => setSingle(e.target.value)}
              placeholder={(Number(vital.value) / 18).toFixed(1)}
              className="mt-2 w-full h-16 text-2xl font-bold text-center rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
            />
            {single && !isNaN(Number(single)) && (
              <p className="text-lg text-gray-400 text-center mt-2">
                ≈ {Math.round(Number(single) * 18)} mg/dL
              </p>
            )}
          </div>
        ) : (
          <div>
            <label className="text-lg font-medium text-gray-600">
              {vital.label} ({vital.unit})
            </label>
            <input
              type="number"
              inputMode="numeric"
              value={single}
              onChange={(e) => setSingle(e.target.value)}
              placeholder={vital.value}
              className="mt-2 w-full h-16 text-2xl font-bold text-center rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
            />
          </div>
        )}

        <button
          disabled={!canSave}
          onClick={handleSave}
          className={`mt-6 w-full h-16 rounded-2xl text-xl font-bold text-white shadow-md transition-transform active:scale-[0.98] ${
            canSave ? "bg-blue-600" : "bg-gray-300"
          }`}
        >
          Save Reading
        </button>
      </div>
    </div>
  );
}

function MedEditSheet({ med, inventory, onClose, onSave, onDelete, onCreateInventoryItem }) {
  const isNew = !med.id;
  const [brandName, setBrandName] = useState(med.brandName || "");
  const [selectedInventoryId, setSelectedInventoryId] = useState(med.inventoryId || "");
  const [manualName, setManualName] = useState(med.inventoryId ? "" : med.genericName || "");
  const [dosageAmount, setDosageAmount] = useState(String(med.dosageAmount || ""));
  const [dosageUnit, setDosageUnit] = useState(med.dosageUnit || "mg");
  const [unitsPerDose, setUnitsPerDose] = useState(med.unitsPerDose || 1);
  const [instructions, setInstructions] = useState(med.instructions || "");
  const [times, setTimes] = useState(med.times && med.times.length ? med.times : ["08:00"]);

  const [showAddNew, setShowAddNew] = useState(false);
  const [newItemName, setNewItemName] = useState("");
  const [newItemUnit, setNewItemUnit] = useState("tablet(s)");
  const [newItemCount, setNewItemCount] = useState("");
  const [newItemThreshold, setNewItemThreshold] = useState("");
  const [newItemDose, setNewItemDose] = useState("");

  const hasMedicineSelected = selectedInventoryId || manualName.trim();
  const canSave =
    hasMedicineSelected && dosageAmount.trim() && times.length > 0 && times.every((t) => t);

  const updateTime = (i, value) => {
    setTimes((prev) => prev.map((t, idx) => (idx === i ? value : t)));
  };
  const addTime = () => setTimes((prev) => [...prev, "12:00"]);
  const removeTime = (i) => setTimes((prev) => prev.filter((_, idx) => idx !== i));

  const handleCreateNewItem = () => {
    if (!newItemName.trim()) return;
    const newId = onCreateInventoryItem({
      name: newItemName.trim(),
      unit: newItemUnit,
      count: Number(newItemCount) || 0,
      lowStockThreshold: newItemThreshold === "" ? null : Number(newItemThreshold),
      dosePerIntake: Number(newItemDose) || 1,
      dosage: dosageAmount.trim(), // reuses this medicine's own Dosage field — no need to type it twice
    });
    setSelectedInventoryId(newId);
    setManualName("");
    setShowAddNew(false);
    setNewItemName("");
    setNewItemCount("");
    setNewItemThreshold("");
    setNewItemDose("");
  };

  const handleSave = () => {
    if (!canSave) return;
    const selectedItem = inventory.find((i) => i.id === selectedInventoryId);
    onSave({
      ...med,
      brandName: brandName.trim(),
      genericName: selectedInventoryId ? selectedItem?.name || manualName.trim() : manualName.trim(),
      inventoryId: selectedInventoryId,
      unitsPerDose: Number(unitsPerDose) || 1,
      dosageAmount: String(dosageAmount).trim(),
      dosageUnit,
      instructions: instructions.trim(),
      times,
    });
  };

  return (
    <div className="fixed inset-0 z-40 flex items-end justify-center max-w-md mx-auto left-0 right-0">
      <div className="absolute inset-0 bg-black/40" onClick={onClose} />
      <div className="relative w-full bg-white rounded-t-[28px] p-6 pb-8 shadow-2xl animate-[slideUp_.2s_ease-out] max-h-[85vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-5">
          <h3 className="app-font-display text-2xl font-bold text-gray-900">
            {isNew ? "Add Medication" : "Edit Medication"}
          </h3>
          <button
            onClick={onClose}
            aria-label="Close"
            className="h-11 w-11 rounded-full bg-gray-100 flex items-center justify-center"
          >
            <XIcon className="h-5 w-5 text-gray-500" />
          </button>
        </div>

        <div className="space-y-4">
          <div>
            <label className="text-lg font-medium text-gray-600 block mb-2">Medicine</label>

            {inventory.length > 0 && (
              <div className="space-y-2 mb-3">
                {inventory.map((item) => (
                  <button
                    key={item.id}
                    onClick={() => {
                      setSelectedInventoryId(item.id);
                      setManualName("");
                      if (item.dosage) setDosageAmount(item.dosage);
                      if (item.dosePerIntake) setUnitsPerDose(String(item.dosePerIntake));
                    }}
                    className={`w-full h-16 rounded-2xl border-2 px-4 flex items-center justify-between transition-colors ${
                      selectedInventoryId === item.id
                        ? "bg-blue-600 border-blue-600 text-white"
                        : "bg-white border-gray-200 text-gray-800"
                    }`}
                  >
                    <span className="text-lg font-semibold">{item.name}</span>
                    <span className={`text-lg ${selectedInventoryId === item.id ? "text-blue-100" : "text-gray-400"}`}>
                      {item.count} {item.unit} left
                    </span>
                  </button>
                ))}
              </div>
            )}

            {!showAddNew ? (
              <button
                onClick={() => setShowAddNew(true)}
                className="w-full h-14 rounded-2xl bg-white border-2 border-dashed border-blue-200 text-blue-600 text-lg font-semibold flex items-center justify-center gap-2"
              >
                <PlusIcon className="h-5 w-5" />
                Add New Medicine
              </button>
            ) : (
              <div className="bg-blue-50 rounded-2xl p-4 space-y-4">
                <div>
                  <label className="text-lg font-medium text-gray-600">Medicine name</label>
                  <input
                    type="text"
                    value={newItemName}
                    onChange={(e) => setNewItemName(e.target.value)}
                    placeholder="e.g. Lisinopril"
                    className="mt-2 w-full h-14 text-lg font-semibold px-4 rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
                  />
                </div>

                <div>
                  <label className="text-lg font-medium text-gray-600 block mb-2">Unit</label>
                  <div className="flex gap-2 overflow-x-auto">
                    {DOSAGE_UNITS.map((u) => (
                      <button
                        key={u}
                        onClick={() => setNewItemUnit(u)}
                        className={`px-4 h-14 rounded-2xl text-lg font-semibold border-2 whitespace-nowrap transition-colors ${
                          newItemUnit === u
                            ? "bg-blue-600 border-blue-600 text-white"
                            : "bg-white border-gray-200 text-gray-500"
                        }`}
                      >
                        {u}
                      </button>
                    ))}
                  </div>
                </div>

                <div>
                  <label className="text-lg font-medium text-gray-600">Starting count</label>
                  <input
                    type="number"
                    inputMode="numeric"
                    value={newItemCount}
                    onChange={(e) => setNewItemCount(e.target.value)}
                    placeholder="e.g. 30"
                    className="mt-2 w-full h-14 text-lg font-semibold px-4 rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
                  />
                </div>

                <div>
                  <label className="text-lg font-medium text-gray-600">Dose per intake</label>
                  <input
                    type="number"
                    inputMode="numeric"
                    min="1"
                    value={newItemDose}
                    onChange={(e) => setNewItemDose(e.target.value)}
                    placeholder="e.g. 1"
                    className="mt-2 w-full h-14 text-lg font-semibold px-4 rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
                  />
                  <p className="text-sm text-gray-400 mt-1">
                    How many {newItemUnit || "units"} are taken each time
                  </p>
                </div>

                <div>
                  <label className="text-lg font-medium text-gray-600">Low-stock alert (optional)</label>
                  <input
                    type="number"
                    inputMode="numeric"
                    value={newItemThreshold}
                    onChange={(e) => setNewItemThreshold(e.target.value)}
                    placeholder="e.g. 7"
                    className="mt-2 w-full h-14 text-lg font-semibold px-4 rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
                  />
                  <p className="text-sm text-gray-400 mt-1">
                    Show a warning once the count drops to or below this number
                  </p>
                </div>

                <div className="flex gap-2">
                  <button
                    onClick={() => setShowAddNew(false)}
                    className="flex-1 h-12 rounded-2xl bg-white text-gray-600 text-lg font-semibold"
                  >
                    Cancel
                  </button>
                  <button
                    disabled={!newItemName.trim()}
                    onClick={handleCreateNewItem}
                    className={`flex-1 h-12 rounded-2xl text-lg font-bold text-white ${
                      newItemName.trim() ? "bg-blue-600" : "bg-gray-300"
                    }`}
                  >
                    Use This
                  </button>
                </div>
              </div>
            )}

            {inventory.length === 0 && !showAddNew && (
              <div className="mt-3">
                <label className="text-sm text-gray-400">
                  Or enter a name without tracking inventory for it
                </label>
                <input
                  type="text"
                  value={manualName}
                  onChange={(e) => {
                    setManualName(e.target.value);
                    setSelectedInventoryId("");
                  }}
                  placeholder="e.g. Lisinopril"
                  className="mt-2 w-full h-14 text-lg font-semibold px-4 rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
                />
              </div>
            )}
          </div>

          <div>
            <label className="text-lg font-medium text-gray-600">Brand name (optional)</label>
            <input
              type="text"
              value={brandName}
              onChange={(e) => setBrandName(e.target.value)}
              placeholder="e.g. Zestril"
              className="mt-2 w-full h-14 text-lg font-semibold px-4 rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
            />
          </div>

          <div>
            <label className="text-lg font-medium text-gray-600">Dosage</label>
            <div className="flex gap-2 mt-2">
              <input
                type="text"
                inputMode="decimal"
                value={dosageAmount}
                onChange={(e) => setDosageAmount(e.target.value)}
                placeholder="e.g. 10"
                className="w-24 h-14 text-lg font-semibold text-center px-2 rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
              />
              <div className="flex-1 flex gap-2 overflow-x-auto">
                {DOSAGE_UNITS.map((u) => (
                  <button
                    key={u}
                    onClick={() => setDosageUnit(u)}
                    className={`px-4 h-14 rounded-2xl text-lg font-semibold border-2 whitespace-nowrap transition-colors ${
                      dosageUnit === u
                        ? "bg-blue-600 border-blue-600 text-white"
                        : "bg-white border-gray-200 text-gray-500"
                    }`}
                  >
                    {u}
                  </button>
                ))}
              </div>
            </div>
          </div>

          {selectedInventoryId && (
            <div>
              <label className="text-lg font-medium text-gray-600">Units used per dose</label>
              <input
                type="number"
                inputMode="numeric"
                min="1"
                value={unitsPerDose}

// ---------------------------------------------------------------------------
// Upload / replace a medical document
// ---------------------------------------------------------------------------
function DocumentUploadSheet({ existingDoc, onClose, onSave }) {
  const isReplace = !!existingDoc;
  const [type, setType] = useState(existingDoc?.type || DOCUMENT_TYPES[0]);
  const [title, setTitle] = useState(existingDoc?.title || "");
  const [date, setDate] = useState(existingDoc?.uploadDate?.slice(0, 10) || new Date().toISOString().slice(0, 10));
  const [notes, setNotes] = useState(existingDoc?.notes || "");
  const [file, setFile] = useState(null);
  const [error, setError] = useState("");

  const handleFile = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    if (f.size > MAX_DOCUMENT_BYTES) {
      setError("That file is larger than 20 MB — please choose a smaller one.");
      setFile(null);
      return;
    }
    setError("");
    setFile(f);
  };

  const canSave = title.trim() && (file || isReplace);

  const handleSave = async () => {
    if (!canSave) return;
    let fileData = null;
    if (file) {
      const base64Data = await fileToBase64(file);
      fileData = { base64Data, fileName: file.name, mimeType: file.type, fileSize: file.size };
    }
    onSave({
      id: existingDoc?.id,
      type,
      title: title.trim(),
      uploadDate: date,
      notes: notes.trim(),
      ...fileData,
    });
  };

  return (
    <div className="fixed inset-0 z-40 flex items-end justify-center max-w-md mx-auto left-0 right-0">
      <div className="absolute inset-0 bg-black/40" onClick={onClose} />
      <div className="relative w-full bg-white rounded-t-[28px] p-6 pb-8 shadow-2xl animate-[slideUp_.2s_ease-out] max-h-[85vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-5">
          <h3 className="app-font-display text-2xl font-bold text-gray-900">
            {isReplace ? "Replace Document" : "Upload Document"}

          <button
            onClick={onClose}
            aria-label="Close"
            className="h-11 w-11 rounded-full bg-gray-100 flex items-center justify-center"
          >
            <XIcon className="h-5 w-5 text-gray-500" />
          </button>
        </div>

        <div className="space-y-4">
          <div>
            <label className="text-lg font-medium text-gray-600 block mb-2">Document type</label>
            <div className="flex flex-wrap gap-2">
              {DOCUMENT_TYPES.map((t) => (
                <button
                  key={t}
                  onClick={() => setType(t)}
                  className={`px-4 h-12 rounded-2xl text-lg font-semibold border-2 transition-colors ${
                    type === t
                      ? "bg-blue-600 border-blue-600 text-white"
                      : "bg-white border-gray-200 text-gray-500"
                  }`}
                >
                  {t}
                </button>
              ))}
            </div>
          </div>

          <div>
            <label className="text-lg font-medium text-gray-600">Title</label>
            <input
              type="text"
              value={title}
              onChange={(e) => setTitle(e.target.value)}
              placeholder="e.g. Blood test — July 2026"
              className="mt-2 w-full h-14 text-lg font-semibold px-4 rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
            />
          </div>

          <div>
            <label className="text-lg font-medium text-gray-600">Date</label>
            <input
              type="date"
              value={date}
              onChange={(e) => setDate(e.target.value)}
              className="mt-2 w-full h-14 text-lg font-semibold px-4 rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
            />
          </div>

          <div>
            <label className="text-lg font-medium text-gray-600">Notes (optional)</label>
            <input
              type="text"
              value={notes}
              onChange={(e) => setNotes(e.target.value)}

              className="mt-2 w-full h-14 text-lg px-4 rounded-2xl border-2 border-gray-200 focus:border-blue-500 focus:outline-none"
            />
          </div>

          <div>
            <label className="text-lg font-medium text-gray-600 block mb-2">
              {isReplace ? "Replacement file" : "File"}
            </label>

              <FileTextIcon className="h-5 w-5" />

// ---------------------------------------------------------------------------
// Notify Emergency Contacts — preview, recipient selection, privacy
// confirmation, then hand off to SMS / Messenger / clipboard.
// ---------------------------------------------------------------------------
function EmergencyNotifyModal({ message, doctors, contacts, onClose, showToast }) {
  const allRecipients = [...doctors.map((d) => ({ ...d, kind: "Doctor" })), ...contacts.map((c) => ({ ...c, kind: "Emergency" }))];
  const [selectedIds, setSelectedIds] = useState(() => new Set(allRecipients.map((r) => r.id)));
  const [confirmed, setConfirmed] = useState(false);

  const toggleRecipient = (id) => {
    setSelectedIds((prev) => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  const selected = allRecipients.filter((r) => selectedIds.has(r.id));

  const handleCopy = async () => {
    try {
      await navigator.clipboard.writeText(message);
      showToast("Message copied");
    } catch (err) {
      showToast("Couldn't copy — please select and copy manually");
    }
  };

  const handleSms = () => {
    const phones = selected.map((r) => r.phone).filter(Boolean).join(",");
    if (!phones) return showToast("No phone numbers selected");
    window.location.href = smsLinkFor(phones, message);
  };

  const handleMessenger = async (recipient) => {
    const link = messengerLinkFor(recipient);
    if (!link) return showToast(`No Messenger info for ${recipient.name}`);
    // Messenger can't be opened with a pre-filled message — copy it first.
    try {
      await navigator.clipboard.writeText(message);
      showToast("Message copied — paste it into Messenger");
    } catch (err) {
      showToast("Opening Messenger — copy the message above first");
    }
    window.open(link, "_blank");
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center max-w-md mx-auto left-0 right-0">
      <div className="absolute inset-0 bg-black/50" onClick={onClose} />
      <div className="relative w-full bg-white rounded-t-[28px] p-6 pb-8 shadow-2xl animate-[slideUp_.2s_ease-out] max-h-[90vh] overflow-y-auto">
        <div className="flex items-center justify-between mb-4">
          <h3 className="app-font-display text-2xl font-bold text-gray-900">
            Notify Emergency Contacts
          </h3>
          <button
            onClick={onClose}
            aria-label="Close"
            className="h-11 w-11 rounded-full bg-gray-100 flex items-center justify-center"
          >
            <XIcon className="h-5 w-5 text-gray-500" />
          </button>
        </div>

        {!confirmed ? (
          <>
            <div className="bg-amber-50 rounded-2xl p-4 flex gap-3 mb-5">
              <AlertTriangleIcon className="h-6 w-6 text-amber-600 shrink-0" />
              <p className="text-lg text-amber-900">
                This will share sensitive medical information with your selected emergency contacts.
              </p>
            </div>

            <p className="text-lg font-bold text-gray-800 mb-2">Send to</p>
            <div className="space-y-2 mb-5">
              {allRecipients.map((r) => (
                <label
                  key={r.id}
                  className="flex items-center gap-3 bg-gray-50 rounded-2xl p-3"
                >
                  <input
                    type="checkbox"
                    checked={selectedIds.has(r.id)}
                    onChange={() => toggleRecipient(r.id)}
                    className="h-6 w-6 shrink-0"
                  />
                  <span className="text-lg font-semibold text-gray-800">{r.name}</span>
                  <span className="text-lg text-gray-400">({r.kind})</span>
                </label>
              ))}
            </div>

            <p className="text-lg font-bold text-gray-800 mb-2">Message preview</p>
            <div className="whitespace-pre-wrap text-lg text-gray-700 bg-gray-50 rounded-2xl p-4 mb-5 font-sans">
              {message.split("\n").map((line, i) => {
                const isScheduleLine =
                  line.trim().startsWith("Scheduled:") ||
                  line.trim().startsWith("Last taken") ||
                  line.trim().startsWith("Not taken yet");
                return (
                  <div key={i} className={isScheduleLine ? "text-[13px]" : ""}>
                    {line || "\u00A0"}
                  </div>
                );
              })}
            </div>

            <button
              disabled={selected.length === 0}

// ---------------------------------------------------------------------------
// Simple hand-rolled SVG line chart (no charting library dependency)
// ---------------------------------------------------------------------------
function VitalsLineChart({ series, height = 180 }) {
  const width = 320;
  const padding = 28;

  const allYs = series.flatMap((s) => s.points.map((p) => p.y));
  if (allYs.length === 0) {
    return (
      <div className="h-40 flex items-center justify-center text-lg text-gray-400">
        Not enough readings yet
      </div>
    );
  }

  const minY = Math.min(...allYs);
  const maxY = Math.max(...allYs);
  const range = maxY - minY || 1;
  const maxLen = Math.max(...series.map((s) => s.points.length), 1);
  const stepX = maxLen > 1 ? (width - 2 * padding) / (maxLen - 1) : 0;

  const toXY = (p, i) => ({
    x: padding + i * stepX,
    y: height - padding - ((p.y - minY) / range) * (height - 2 * padding),
  });

  const firstLabel = series[0].points[0]?.label;
  const lastLabel = series[0].points[series[0].points.length - 1]?.label;

  return (
    <div>
      <svg viewBox={`0 0 ${width} ${height}`} className="w-full" style={{ height }}>
        <line
          x1={padding} y1={height - padding} x2={width - padding} y2={height - padding}
          stroke="#e5e7eb" strokeWidth="1"
        />
        <text x={padding} y={padding - 10} fontSize="11" fill="#9ca3af">{maxY}</text>
        <text x={padding} y={height - padding + 4} fontSize="11" fill="#9ca3af">{minY}</text>

        {series.map((s) => {
          const coords = s.points.map(toXY);
          const path = coords.map((c, i) => (i === 0 ? "M" : "L") + c.x + "," + c.y).join(" ");
          return (
            <g key={s.label}>
              <path d={path} fill="none" stroke={s.color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
              {coords.map((c, i) => (
                <circle key={i} cx={c.x} cy={c.y} r="3.5" fill={s.color} />
              ))}
            </g>
          );
        })}
      </svg>

      <div className="flex items-center justify-between mt-1 px-1">
        <span className="text-sm text-gray-400">{firstLabel || ""}</span>
        <span className="text-sm text-gray-400">{lastLabel || ""}</span>
      </div>

      {series.length > 1 && (
        <div className="flex items-center gap-4 mt-3 px-1">
          {series.map((s) => (
            <div key={s.label} className="flex items-center gap-2">
              <span className="h-3 w-3 rounded-full" style={{ backgroundColor: s.color }} />
              <span className="text-sm font-semibold text-gray-600">{s.label}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ---------------------------------------------------------------------------
function ageFromDob(dob) {
  if (!dob) return null;
  const birth = new Date(dob);
  if (isNaN(birth)) return null;
  const now = new Date();
  let age = now.getFullYear() - birth.getFullYear();
  const m = now.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && now.getDate() < birth.getDate())) age--;
  return age;
}

// Messenger has no way to deep-link with a pre-filled message — this just
// resolves which link to open (username takes priority over a raw profile
// URL), and the caller is responsible for copying the message to the
// clipboard first, per Messenger's own limitation.
function messengerLinkFor(contact) {
  if (!contact) return null;
  if (contact.messengerUsername && contact.messengerUsername.trim()) {
    return `https://m.me/${contact.messengerUsername.trim().replace(/^@/, "")}`;
  }
  if (contact.facebookProfileUrl && contact.facebookProfileUrl.trim()) {
    return contact.facebookProfileUrl.trim();
  }
  return null;
}

function smsLinkFor(phone, body) {
  const cleanPhone = (phone || "").replace(/[^\d+]/g, "");
  return `sms:${cleanPhone}?body=${encodeURIComponent(body)}`;
}

function buildEmergencyMessage({ profile, vitals, meds, doseLog, doctors, contacts, documents }) {
  const lines = [];
  lines.push("🚨 EMERGENCY HEALTH UPDATE");
  lines.push("");
  lines.push("Patient:");
  lines.push(profile.name || profile.nickname || "—");
  const age = ageFromDob(profile.dob);
  if (age !== null) lines.push(`Age: ${age}`);
  if (profile.bloodtype) lines.push(`Blood Type: ${profile.bloodtype}`);
  if (profile.height || profile.weight) {
    lines.push(`${profile.height || "—"} · ${profile.weight || "—"}`);
  }
  lines.push("");

  vitals.forEach((v) => {
    lines.push(`${v.label}:`);
    lines.push(`${v.value} ${v.unit}`);
    lines.push(`(Logged ${v.time})`);
    lines.push("");
  });

  lines.push("Current Medications");
  lines.push("");
  if (meds.length === 0) {
    lines.push("• None on file");
  } else {
    meds.forEach((m) => {
      const displayName = m.genericName || m.brandName;
      lines.push(`• ${displayName} ${m.dosageAmount}${m.dosageUnit}`);
      lines.push(`  Scheduled: ${(m.times || []).map(formatTime12h).join(", ")}`);
      const takenDoses = (doseLog || [])
        .filter((d) => d.medicationId === m.id && d.taken && d.completedAt)
        .sort((a, b) => a.time.localeCompare(b.time));
      if (takenDoses.length > 0) {
        const latest = takenDoses[takenDoses.length - 1];
        // completedAtDate is only set for doses ticked in this browser
        // session; anything fetched from the server is always from today
        // (readTodayDoseLog only ever returns today's rows), so a missing
        // date here safely defaults to "today" rather than guessing wrong.
        const dateLabel =
          latest.completedAtDate && latest.completedAtDate !== todayLocalDateString() ? "yesterday" : "today";
        lines.push(`  Last taken ${dateLabel}: ${latest.completedAt}`);
      } else {
        lines.push(`  Not taken yet today`);
      }
    });
  }
  lines.push("");

  if (doctors.length > 0) {
    lines.push("Primary Doctor");
    lines.push("");
    const d = doctors[0];
    lines.push(d.name);
    lines.push(d.phone);
    lines.push("");
  }

  if (contacts.length > 0) {
    lines.push("Emergency Contacts");
    lines.push("");
    contacts.forEach((c) => lines.push(c.name));
    lines.push("");
  }

  if (documents.length > 0) {
    lines.push("Medical Records");
    lines.push("");
    documents.slice(0, 4).forEach((doc) => {
      lines.push(doc.type);
      lines.push(doc.driveUrl ? doc.driveUrl : "(will be available once synced online)");
      lines.push("");
    });
  }

  lines.push(`Generated ${new Date().toLocaleString()}`);
  return lines.join("\n");
}

  ); // { Morning: "8:15 AM" }

  const [confirmSubmitting, setConfirmSubmitting] = useState(false);
  const [dismissedPeriods, setDismissedPeriods] = useState({}); // "Go Back" without re-triggering the same modal instantly

  // Admin / "View As" — isAdmin is derived from the REAL signed-in email
  // (the userEmail prop, which never changes), not from whichever account
  // is currently being viewed. viewingAsEmail is null under normal use.

    setCurrentUserEmail(email);
    setShowViewAsPicker(false);
    setLoading(true);
    setProfileLoading(true);
    showToast(`Viewing as ${email}`);
  };

  const exitViewingAs = () => {
    setViewingAsEmail(null);
    setCurrentUserEmail(userEmail);
    setLoading(true);
    setProfileLoading(true);
    showToast("Back to your own account");
  };

  const [isOnline, setIsOnline] = useState(() =>
    typeof navigator !== "undefined" ? navigator.onLine : true
  );
  const [pendingCount, setPendingCount] = useState(() => getQueue().length);

  const showToast = useCallback((message) => {
    setToast(message);
    window.setTimeout(() => setToast(null), 2200);
  }, []);

  // Track connectivity, and sweep the pending-sync queue whenever we come
  // back online so nothing typed offline gets stuck.
  useEffect(() => {
    const goOnline = async () => {
      setIsOnline(true);
      const remaining = await flushQueue();
      setPendingCount(remaining);
      const fileResults = await flushFileQueue();
      if (fileResults.length > 0) {
        setDocuments((prev) =>
          prev.map((doc) => {
            const match = fileResults.find((r) => r.record.meta.id === doc.id);
            return match && match.res ? { ...doc, driveUrl: match.res.driveUrl, driveFileId: match.res.driveFileId } : doc;
          })
        );
      }
      if (remaining === 0) showToast("Back online — your changes are synced");
    };
    const goOffline = () => setIsOnline(false);
    window.addEventListener("online", goOnline);
    window.addEventListener("offline", goOffline);
    return () => {
      window.removeEventListener("online", goOnline);
      window.removeEventListener("offline", goOffline);
    };
  }, [showToast]);

  // Register this sign-in with the Users sheet. Uses the same offline queue
  // as every other write, so it still lands in the Sheet once back online.
  useEffect(() => {
    if (!userEmail) return;
    performApiAction("loginUser", { email: userEmail }, setPendingCount);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [userEmail]);

  // Keep every dataset mirrored to local storage so a reload — online or
  // offline — always shows the most recent entries, even unsynced ones.
  useEffect(() => saveLocal("vitals", vitals), [vitals]);
  useEffect(() => saveLocal("medications", meds), [meds]);
  useEffect(() => {
    saveLocal("doseLog", doseLog);
    saveLocal("doseLogDate", todayLocalDateString());
  }, [doseLog]);
  useEffect(() => saveLocal("inventory", inventory), [inventory]);
  useEffect(() => saveLocal("confirmedPeriods", confirmedPeriods), [confirmedPeriods]);
  useEffect(() => saveLocal("history", history), [history]);
  useEffect(() => saveLocal("profile", profile), [profile]);
  useEffect(() => saveLocal("doctors", doctors), [doctors]);
  useEffect(() => saveLocal("emergencyContacts", emergencyContacts), [emergencyContacts]);
  useEffect(() => saveLocal("documents", documents), [documents]);
  useEffect(() => saveLocal("chatDraft", chatMessages), [chatMessages]);
  useEffect(() => saveLocal("checkIns", checkIns), [checkIns]);

  useEffect(() => {
    if (!isBackendConfigured()) return;
    (async () => {
      if (typeof navigator !== "undefined" && navigator.onLine) {
        const remaining = await flushQueue();
        setPendingCount(remaining);
      }
      try {
        const data = await fetchApi("getData");
        if (data && data.vitals) {
          setVitals(
            data.vitals.map((v) => ({
              ...v,
              icon: VITAL_ICONS[v.id],
              accent: VITAL_STYLE[v.id]?.accent,
              ring: VITAL_STYLE[v.id]?.ring,
              chip:
                v.status === "Normal"
                  ? "bg-green-100 text-green-800"
                  : "bg-amber-100 text-amber-800",
            }))
          );
        }
        if (data && data.medications) setMeds(data.medications);
        if (data && data.doseLog) {
          // Under the confirm-and-lock model, the server's DoseLog only
          // ever contains entries for periods that have already been
          // confirmed (written once, in one clean batch, by
          // confirmPeriodDoses) — it has no knowledge of in-progress local
          // ticks for a period that hasn't been confirmed yet. So: keep
          // local-only progress for anything not yet confirmed, and let
          // the server's data win for anything that has been.
          const confirmed = (data && data.confirmedPeriods) || {};
          setDoseLog((prevLocal) => {
            const stillInProgress = prevLocal.filter((d) => !confirmed[periodForTime(d.time)]);
            return [...stillInProgress, ...data.doseLog];
          });
        }
        if (data && data.confirmedPeriods) setConfirmedPeriods(data.confirmedPeriods);
        if (data && data.inventory) setInventory(data.inventory);
        if (data && data.backendVersion) setBackendVersion(data.backendVersion);
      } catch (err) {
        setStartupFetchFailed(true);
        showToast(
          pendingCount > 0
            ? "Offline — showing your saved entries"
            : "Could not reach the server — showing saved data"
        );
      } finally {
        setLoading(false);
      }

      // Fetch the profile too, right away — this is what resolves the
      // header greeting from "Fetching latest data…" to an actual name
      // as soon as possible after login or a refresh, rather than only
      // once someone happens to visit Settings.
      try {
        const profileData = await fetchApi("getProfile");
        if (profileData && profileData.profile) setProfile(profileData.profile);
        if (profileData && profileData.doctors) setDoctors(profileData.doctors);
        if (profileData && profileData.emergencyContacts) setEmergencyContacts(profileData.emergencyContacts);
      } catch (err) {
        setStartupFetchFailed(true);
        // Offline or unreachable — keep showing whatever's cached locally.
      } finally {
        setProfileLoading(false);
      }
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [showToast, viewingAsEmail]);

  const toggleDose = (medicationId, time) => {
    const med = meds.find((m) => m.id === medicationId);
    const period = periodForTime(time);
    if (confirmedPeriods[period]) {
      showToast(`${period} is locked until tomorrow`);
      return;
    }

    const key = doseKey(medicationId, time);
    const existingEntry = doseLog.find((d) => doseKey(d.medicationId, d.time) === key);
    const willBeTaken = !(existingEntry && existingEntry.taken);

    // Only restrict the act of marking something taken — undoing a mistake
    // (un-ticking) is still allowed any time, since that's just a correction.
    // Admin is exempt from this specific restriction; a locked period still
    // requires the dedicated Unlock action below, not a silent bypass here.
    if (willBeTaken && !isAdmin && currentPeriod() !== period) {
      showToast(`You're not scheduled to take this medicine right now — it's a ${period.toLowerCase()} medicine.`);
      return;
    }

    let nextTaken = true;
    const nowLabel = new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    setDoseLog((prev) => {
      const existing = prev.find((d) => doseKey(d.medicationId, d.time) === key);
      if (existing) {
        nextTaken = !existing.taken;
        return prev.map((d) =>
          doseKey(d.medicationId, d.time) === key
            ? {
                ...d,
                taken: nextTaken,
                completedAt: nextTaken ? nowLabel : "",
                completedAtDate: nextTaken ? todayLocalDateString() : "",
              }
            : d
        );
      }
      nextTaken = true;
      return [...prev, { medicationId, time, taken: true, completedAt: nowLabel, completedAtDate: todayLocalDateString() }];
    });

    // Local-only feedback on the count — the real deduction happens once,
    // server-side, when the whole period is confirmed (see confirmPeriod).
    if (med && med.inventoryId) {
      const delta = nextTaken ? -(Number(med.unitsPerDose) || 1) : Number(med.unitsPerDose) || 1;
      setInventory((prev) =>
        prev.map((item) => (item.id === med.inventoryId ? { ...item, count: item.count + delta } : item))
      );
    }
  };

  // Pushes every dose in a completed period to the Sheet in ONE batch call,
  // then locks that period for the rest of the day. This is the only
  // network write dose-taking ever makes now — individual taps never touch
  // the server at all.
  // Admin-only: fetches every registered user for the View As picker.
  const openViewAsPicker = async () => {
    if (!isAdmin) return;
    setShowViewAsPicker(true);
    try {
      const res = await fetchApi("getAllUsers", userEmail);
      if (res && res.users) setAllUsers(res.users);
      else if (res && res.error) showToast(res.error);
    } catch (err) {
      showToast("Couldn't load the user list");
    }
  };

  const confirmPeriod = async (period) => {
    const doses = dosesByPeriod[period].map((d) => ({ medicationId: d.med.id, time: d.time }));
    setConfirmSubmitting(true);
    try {
      const res = await performApiAction("confirmPeriodDoses", { period, doses }, setPendingCount);
      if (res && res.error) {
        showToast(`Couldn't confirm ${period} — ${res.error}`);
        return;
      }
      const nowLabel = new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      setConfirmedPeriods((prev) => ({
        ...prev,
        [period]: (res && res.confirmedPeriods && res.confirmedPeriods[period]) || nowLabel,
      }));
      setPendingConfirmPeriod(null);
      showToast(
        res
          ? `${period} confirmed and saved`
          : `${period} confirmed — will sync when online`
      );
    } finally {
      setConfirmSubmitting(false);
    }
  };

  // Admin-only: fully undoes a confirmed/locked period — resets its doses
  // back to untaken, restores any inventory deducted at confirm time, and
  // removes the lock. Works whether admin is on their own account or
  // "viewing as" someone else, since `email` in the request is whichever
  // account is currently effective.
  const unlockPeriod = async (period) => {
    if (!isAdmin) return;
    try {
      const res = await callApi("unlockPeriod", { actingAdmin: userEmail, period });
      if (res && res.error) {
        showToast(`Couldn't unlock ${period} — ${res.error}`);
        return;
      }
      if (res && res.doseLog) setDoseLog(res.doseLog);
      if (res && res.confirmedPeriods) setConfirmedPeriods(res.confirmedPeriods);
      if (res && res.inventory) setInventory(res.inventory);
      showToast(`${period} unlocked — doses reset for redo`);
    } catch (err) {
      showToast(`Couldn't reach the server to unlock ${period}`);
    }
  };

  // Auto-opens the confirm screen the moment every dose in a period has
  // been ticked locally — but never re-opens over an already-confirmed
  // (locked) period, never interrupts a modal already showing, and won't
  // immediately pop back up right after "Go Back & Edit" was tapped (that
  // dismissal clears itself once the period genuinely changes again).
  useEffect(() => {
    if (pendingConfirmPeriod) return;
    for (const period of ["Morning", "Afternoon", "Evening"]) {
      const list = dosesByPeriod[period];
      const allTaken = list.length > 0 && list.every((d) => d.taken);
      if (!allTaken) {
        if (dismissedPeriods[period]) {
          setDismissedPeriods((prev) => {
            const next = { ...prev };
            delete next[period];
            return next;
          });
        }
        continue;
      }
      if (confirmedPeriods[period] || dismissedPeriods[period]) continue;
      setPendingConfirmPeriod(period);
      break;
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [doseLog, meds, confirmedPeriods, dismissedPeriods, pendingConfirmPeriod]);

  const saveVital = async (vitalId, value) => {
    setLoggingVital(null);
    const now = new Date();
    const timeLabel = `Today, ${now.toLocaleTimeString([], {
      hour: "numeric",
      minute: "2-digit",
    })}`;
    setVitals((prev) =>
      prev.map((v) => (v.id === vitalId ? { ...v, value, time: timeLabel } : v))
    );
    showToast(isOnline ? "Reading saved" : "Reading saved — will sync when online");
    await performApiAction(
      "logVital",
      { id: vitalId, value, timestamp: now.toISOString() },
      setPendingCount
    );
  };

  const saveMed = async (med) => {
    setEditingMed(null);
    const isNew = !med.id;

    if (isNew) {
      const tempId = "temp_" + Date.now();
      setMeds((prev) => [...prev, { ...med, id: tempId }]);
      showToast(isOnline ? "Medication added" : "Medication added — will sync when online");
      const res = await performApiAction("addMedication", med, setPendingCount);
      if (res && res.id) {
        setMeds((prev) => prev.map((m) => (m.id === tempId ? { ...m, id: res.id } : m)));
        // If any doses were ticked for this medicine in the brief window
        // before the server assigned a real ID, they're keyed by the
        // temporary ID — migrate them now, or they become permanently
        // orphaned (invisible on the tile and in Reports) since nothing
        // in the app would ever match that temp ID again.
        setDoseLog((prev) =>
          prev.map((d) => (d.medicationId === tempId ? { ...d, medicationId: res.id } : d))
        );
      }
      return;
    }

    setMeds((prev) => prev.map((m) => (m.id === med.id ? med : m)));
    showToast(isOnline ? "Medication updated" : "Medication updated — will sync when online");
    await performApiAction("updateMedication", med, setPendingCount);

    // Keep the linked inventory item's Dosage in sync — editing a
    // medicine's dosage here shouldn't silently drift out of step with
    // what Settings → Inventory shows for the same medicine.
    if (med.inventoryId) {
      const linkedItem = inventory.find((i) => i.id === med.inventoryId);
      if (linkedItem && linkedItem.dosage !== med.dosageAmount) {
        const updatedItem = { ...linkedItem, dosage: med.dosageAmount };
        setInventory((prev) => prev.map((i) => (i.id === med.inventoryId ? updatedItem : i)));
        await performApiAction("updateInventoryItem", updatedItem, setPendingCount);
      }
    }
  };

  const confirmDeleteMed = async (med) => {
    setDeletingMed(null);
    setEditingMed(null);
    setMeds((prev) => prev.filter((m) => m.id !== med.id));
    setDoseLog((prev) => prev.filter((d) => d.medicationId !== med.id));
    showToast(isOnline ? "Medication deleted" : "Medication deleted — will sync when online");
    await performApiAction("deleteMedication", { id: med.id }, setPendingCount);
  };

  // Called synchronously from inside MedEditSheet's inline "Add New Medicine"
  // form — returns a usable id immediately so the picker can select it right
  // away, while the real save happens in the background.
  const onCreateInventoryItem = (newItem) => {
    const tempId = "temp_" + Date.now();
    setInventory((prev) => [...prev, { ...newItem, id: tempId }]);
    showToast(isOnline ? "Added to inventory" : "Added to inventory — will sync when online");
    performApiAction("addInventoryItem", newItem, setPendingCount).then((res) => {
      if (res && res.id) {
        setInventory((prev) => prev.map((i) => (i.id === tempId ? { ...i, id: res.id } : i)));
      }
    });
    return tempId;
  };

  const saveInventoryItem = async (item) => {
    setEditingInventoryItem(null);
    const isNew = !item.id;

    if (isNew) {
      const tempId = "temp_" + Date.now();
      setInventory((prev) => [...prev, { ...item, id: tempId }]);
      showToast(isOnline ? "Added to inventory" : "Added to inventory — will sync when online");
      const res = await performApiAction("addInventoryItem", item, setPendingCount);
      if (res && res.id) {
        setInventory((prev) => prev.map((i) => (i.id === tempId ? { ...i, id: res.id } : i)));
      }
      return;
    }

    setInventory((prev) => prev.map((i) => (i.id === item.id ? item : i)));
    showToast(isOnline ? "Inventory updated" : "Inventory updated — will sync when online");
    await performApiAction("updateInventoryItem", item, setPendingCount);
  };

  const confirmDeleteInventoryItem = async (item) => {
    setDeletingInventoryItem(null);
    setEditingInventoryItem(null);
    setInventory((prev) => prev.filter((i) => i.id !== item.id));
    // Unlink any medicines that referenced it — mirrors the backend, which
    // does the same rather than leaving a dangling reference.
    setMeds((prev) => prev.map((m) => (m.inventoryId === item.id ? { ...m, inventoryId: "" } : m)));
    showToast(isOnline ? "Removed from inventory" : "Removed — will sync when online");
    await performApiAction("deleteInventoryItem", { id: item.id }, setPendingCount);
  };

  useEffect(() => {
    if (activeTab !== "reports" || !isBackendConfigured()) return;
    setHistoryLoading(true);
    (async () => {
      try {
        const data = await fetchApi("getVitalsHistory");
        if (data && data.history) setHistory(data.history);
      } catch (err) {
        if (history.length === 0) showToast("Offline — no saved history yet");
      } finally {
        setHistoryLoading(false);
      }
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeTab, showToast]);

  useEffect(() => {
    if (activeTab !== "settings" || !isBackendConfigured()) return;
    setProfileLoading(true);
    (async () => {
      try {
        const data = await fetchApi("getProfile");
        if (data && data.profile) setProfile(data.profile);
        if (data && data.doctors) setDoctors(data.doctors);
        if (data && data.emergencyContacts) setEmergencyContacts(data.emergencyContacts);
      } catch (err) {
        showToast("Offline — showing your saved profile");
      } finally {
        setProfileLoading(false);
      }
      try {
        const docData = await fetchApi("getDocuments");
        if (docData && docData.documents) setDocuments(docData.documents);
      } catch (err) {
        // Offline — keep showing whatever's cached locally.
      }
    })();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeTab, showToast]);

  const saveProfile = async (updated) => {
    setEditingProfile(false);
    setProfile({ ...updated, bloodtype: updated.bloodType });
    showToast(isOnline ? "Profile updated" : "Profile updated — will sync when online");
    await performApiAction("updateProfile", updated, setPendingCount);
  };

  const saveContact = async (contact) => {
    setEditingContact(null);
    const isNew = !contact.id;
    const listSetter = contact.type === "Doctor" ? setDoctors : setEmergencyContacts;
    const label = contact.type === "Doctor" ? "Doctor" : "Contact";

    if (isNew) {
      const tempId = "temp_" + Date.now();
      listSetter((prev) => [...prev, { ...contact, id: tempId }]);
      showToast(isOnline ? `${label} added` : `${label} added — will sync when online`);
      const res = await performApiAction("addContact", contact, setPendingCount);
      if (res && res.id) {
        listSetter((prev) => prev.map((c) => (c.id === tempId ? { ...c, id: res.id } : c)));
      }
      return;
    }

    listSetter((prev) => prev.map((c) => (c.id === contact.id ? contact : c)));
    showToast(isOnline ? `${label} updated` : `${label} updated — will sync when online`);
    await performApiAction("updateContact", contact, setPendingCount);
  };

  const confirmDeleteContact = async (contact) => {
    setDeletingContact(null);
    setEditingContact(null);
    const listSetter = contact.type === "Doctor" ? setDoctors : setEmergencyContacts;
    listSetter((prev) => prev.filter((c) => c.id !== contact.id));
    showToast(isOnline ? "Contact removed" : "Contact removed — will sync when online");
    await performApiAction("deleteContact", { id: contact.id }, setPendingCount);
  };

  const saveDocument = async (doc) => {
    setUploadingDocument(null);
    const isNew = !doc.id;
    const { base64Data, fileName, mimeType, fileSize, ...meta } = doc;

    if (isNew) {
      const tempId = "temp_" + Date.now();
      const localEntry = {
        id: tempId,
        type: meta.type,
        title: meta.title,
        notes: meta.notes,
        uploadDate: meta.uploadDate,
        fileName,
        fileSize,
        driveUrl: "",
        driveFileId: "",
      };
      setDocuments((prev) => [localEntry, ...prev]);

      if (!isOnline) {
        await queueFileUpload({
          id: tempId,
          kind: "document",
          meta: { id: tempId, type: meta.type, title: meta.title, notes: meta.notes, uploadDate: meta.uploadDate, uploadedBy: userEmail },
          base64Data,
          mimeType,
          fileName,
        });
        showToast("Document saved — will upload when online");
        return;
      }

      showToast("Uploading document…");
      try {
        const res = await callApi("uploadDocument", { ...meta, fileName, mimeType, base64Data, uploadedBy: userEmail });
        if (res && res.id) {
          setDocuments((prev) =>
            prev.map((d) => (d.id === tempId ? { ...d, id: res.id, driveUrl: res.driveUrl, driveFileId: res.driveFileId } : d))
          );
          showToast("Document uploaded");
        }
      } catch (err) {
        await queueFileUpload({
          id: tempId,
          kind: "document",
          meta: { id: tempId, type: meta.type, title: meta.title, notes: meta.notes, uploadDate: meta.uploadDate, uploadedBy: userEmail },
          base64Data,
          mimeType,
          fileName,
        });
        showToast("Upload failed — will retry automatically");
      }
      return;
    }

    // Replacing an existing document's metadata and/or file
    setDocuments((prev) => prev.map((d) => (d.id === doc.id ? { ...d, ...meta, fileName: fileName || d.fileName } : d)));
    showToast(isOnline ? "Document updated" : "Document updated — will sync when online");
    await performApiAction("updateDocument", { id: doc.id, ...meta, fileName, mimeType, base64Data }, setPendingCount);
  };

  const confirmDeleteDocument = async (doc) => {
    setDeletingDocument(null);
    setDocuments((prev) => prev.filter((d) => d.id !== doc.id));
    showToast(isOnline ? "Document deleted" : "Document deleted — will sync when online");
    await performApiAction("deleteDocument", { id: doc.id }, setPendingCount);
  };

  useEffect(() => {
    if (activeTab !== "chat" || !isBackendConfigured() || !isOnline) return;
    setCheckInsLoading(true);
    (async () => {
      try {
        const data = await fetchApi("getCheckIns");
        if (data && data.checkIns) setCheckIns(data.checkIns);
      } catch (err) {
        // Offline or unreachable — keep showing whatever's cached locally.
      } finally {
        setCheckInsLoading(false);
      }
    })();

    if (aiConfigured === null) {
      (async () => {
        try {
          const status = await fetchApi("getAIStatus");
          setAiConfigured(!!(status && status.configured));
        } catch (err) {
          // Unknown — leave as null and let a real attempt surface the error.
        }
      })();
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [activeTab, isOnline]);

  // These two intentionally do NOT go through performApiAction — this
  // feature is online-only by design, so there's nothing to queue. If the
  // request fails, the person just sees an error and can try again.
  const sendChatMessage = async (text) => {
    const trimmed = (text || "").trim();
    if (!trimmed || !isOnline || chatLoading) return;
    const history = chatMessages;
    setChatMessages((prev) => [...prev, { role: "user", text: trimmed }]);
    setChatInput("");
    setChatLoading(true);
    try {
      const res = await callApi("aiCheckIn", { message: trimmed, history });
      if (res && res.reply) {
        setChatMessages((prev) => [...prev, { role: "model", text: res.reply }]);
      } else {
        const reason = (res && res.error) || "Please try again.";
        setChatMessages((prev) => [...prev, { role: "model", text: `⚠️ Sorry, I couldn't respond. ${reason}` }]);
        showToast("The companion couldn't respond");
      }
    } catch (err) {
      setChatMessages((prev) => [
        ...prev,
        { role: "model", text: "⚠️ Couldn't reach the companion — check your connection and try again." },
      ]);
      showToast("Couldn't reach the companion — check your connection");
    } finally {
      setChatLoading(false);
    }
  };

  const finishCheckIn = async () => {
    if (chatMessages.length === 0 || chatLoading) return;
    setChatLoading(true);
    stopSpeaking();
    setSpeakingIndex(null);
    try {
      const res = await callApi("saveCheckIn", { conversation: chatMessages });
      if (res && res.patientSummary) {
        setCheckIns((prev) => [
          {
            id: res.id || "temp_" + Date.now(),
            date: "Just now",
            patientSummary: res.patientSummary,
            caregiverSummary: res.caregiverSummary,
            symptoms: res.symptoms || [],
            recommendDoctor: res.recommendDoctor,
          },
          ...prev,
        ]);
        setChatMessages([]);
        showToast("Check-in saved");
      } else {
        showToast(res && res.error ? `Couldn't save — ${res.error}` : "Couldn't save the summary — please try again");
      }
    } catch (err) {
      showToast("Couldn't reach the server to save this check-in");
    } finally {
      setChatLoading(false);
    }
  };

  const toggleSpeakMessage = (index, text) => {
    if (speakingIndex === index) {
      stopSpeaking();
      setSpeakingIndex(null);
      return;
    }
    const started = speakText(text, () => setSpeakingIndex(null));
    setSpeakingIndex(started ? index : null);
  };

  const savePhoto = async (file) => {
    setPhotoUploading(true);
    try {
      const { base64Data, objectUrl } = await cropAndCompressImage(file);
      setProfile((prev) => ({ ...prev, profilephotourl: objectUrl }));

      if (!isOnline) {
        await queueFileUpload({
          id: "profile_photo",
          kind: "profilePhoto",
          meta: {},
          base64Data,
          mimeType: "image/jpeg",
          fileName: "profile-photo.jpg",
        });
        showToast("Photo saved — will upload when online");
        return;
      }

      const res = await callApi("uploadProfilePhoto", {
        base64Data,
        mimeType: "image/jpeg",
        fileName: "profile-photo.jpg",
      });
      if (res && res.driveUrl) {
        setProfile((prev) => ({ ...prev, profilephotourl: res.driveUrl }));
        showToast("Photo updated");
      }
    } catch (err) {
      showToast("Couldn't process that photo — please try another");
    } finally {
      setPhotoUploading(false);
    }
  };

  // Expand each medicine's specific times into individual "doses" for today,
  // and group them into Morning/Afternoon/Evening for a scannable layout —
  // while still keeping the real clock time on each row.
  const todayDoses = meds
    .flatMap((m) =>
      (m.times || []).map((time) => {
        const entry = doseLog.find((d) => d.medicationId === m.id && d.time === time);
        return {
          med: m,
          time,
          taken: entry ? entry.taken : false,
          period: periodForTime(time),
        };
      })
    )
    .sort((a, b) => a.time.localeCompare(b.time));

  const dosesByPeriod = { Morning: [], Afternoon: [], Evening: [] };
  todayDoses.forEach((d) => dosesByPeriod[d.period].push(d));

  const totalMeds = todayDoses.length;
  const takenMeds = todayDoses.filter((d) => d.taken).length;

  return (
    <div className="min-h-screen w-full flex justify-center bg-gray-100 app-font">
      <div className="w-full max-w-md min-h-screen bg-[#F8F9FC] relative shadow-2xl overflow-hidden">
